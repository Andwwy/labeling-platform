    const PenLineIcon    = (p) => html`<${Icon} ...${p}><path d="M12 20h9"/><path d="M16.376 3.622a1 1 0 0 1 3.002 3.002L7.368 18.635a2 2 0 0 1-.855.506l-2.872.838a.5.5 0 0 1-.62-.62l.838-2.872a2 2 0 0 1 .506-.854z"/><//>`;
    const TrashIcon      = (p) => html`<${Icon} ...${p}><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/><//>`;
    const FileTextIcon   = (p) => html`<${Icon} ...${p}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/><//>`;
    const TextSelectIcon = (p) => html`<${Icon} ...${p}><path d="M5 3a2 2 0 0 0-2 2"/><path d="M19 3a2 2 0 0 1 2 2"/><path d="M21 19a2 2 0 0 1-2 2"/><path d="M5 21a2 2 0 0 1-2-2"/><path d="M9 3h1"/><path d="M9 21h1"/><path d="M14 3h1"/><path d="M14 21h1"/><path d="M3 9v1"/><path d="M21 9v1"/><path d="M3 14v1"/><path d="M21 14v1"/><path d="M11 8a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2"/><path d="M14 16a2 2 0 0 0 2-2v-4a2 2 0 0 0-2-2"/><path d="M13 8h-1v8h1"/><//>`;
    const SlidersIcon    = (p) => html`<${Icon} ...${p}><line x1="21" y1="4" x2="14" y2="4"/><line x1="10" y1="4" x2="3" y2="4"/><line x1="21" y1="12" x2="12" y2="12"/><line x1="8" y1="12" x2="3" y2="12"/><line x1="21" y1="20" x2="16" y2="20"/><line x1="12" y1="20" x2="3" y2="20"/><line x1="14" y1="2" x2="14" y2="6"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="16" y1="18" x2="16" y2="22"/><//>`;
    const ExternalLinkIcon = (p) => html`<${Icon} ...${p}><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h6"/><//>`;
    // lucide "message-square" — the comment glyph, matching the .pen design system.
    const CommentIcon    = (p) => html`<${Icon} ...${p}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><//>`;

    // =================================================================
    // Hooks
    // =================================================================
    function useDebouncedCallback(fn, delay) {
      const ref = useRef(fn);
      ref.current = fn;
      const timer = useRef(null);
      useEffect(() => () => { if (timer.current) clearTimeout(timer.current); }, []);
      return useCallback((...args) => {
        if (timer.current) clearTimeout(timer.current);
        timer.current = setTimeout(() => ref.current(...args), delay);
      }, [delay]);
    }
    function usePolling(callback, intervalMs, deps) {
      const cb = useRef(callback);
      cb.current = callback;
      useEffect(() => {
        const id = setInterval(() => { cb.current(); }, intervalMs);
        return () => clearInterval(id);
      }, deps ?? []);
    }

    const POLL_INTERVAL_MS = 2000;
    const DEBOUNCE_MS = 400;

    // =================================================================
    // ExtractionPage — 3-pane (Files / Viewer / Rules)
    // =================================================================
    function ExtractionPage() {
      const { current: labeler } = useIdentity();
      const [docs, setDocs] = useState([]);
      const [docFilter, setDocFilter] = useState("all");
      const [docQuery, setDocQuery] = useState("");
      const [activeDocId, setActiveDocId] = useState("");
      const [rules, setRules] = useState([]);
      const [rulesLoading, setRulesLoading] = useState(false);
      const [expandedRuleId, setExpandedRuleId] = useState("");
      // Source-block paging: the right panel shows exactly ONE block at a time.
      // activeUnitKey is the block currently shown (and highlighted in the
      // viewer); the labeler moves between blocks with the Prev/Next pager or by
      // clicking a line in the source body. showEmptyUnits widens the paged set
      // to include blocks with no extracted rule (the missed-rule affordance).
      const [activeUnitKey, setActiveUnitKey] = useState("");
      const [showEmptyUnits, setShowEmptyUnits] = useState(false);
      const [pending, setPending] = useState(null);
      const [confirmingAdd, setConfirmingAdd] = useState(null);
      const [toast, setToast] = useState("");
      const [editMode, setEditMode] = useState(null);
      const [deletingRuleId, setDeletingRuleId] = useState("");
      // Human annotations, loaded per document alongside the rules.
      // commentsByRule: Map(rule_id -> [comment]); blockComments: Map(unitKey ->
      // [comment]); blockOverrides: Map(unitKey -> {blockId,lineStart,lineEnd}).
      const [commentsByRule, setCommentsByRule] = useState(() => new Map());
      const [blockComments, setBlockComments] = useState(() => new Map());
      const [blockOverrides, setBlockOverrides] = useState(() => new Map());
      // Open composers / inline editors (one at a time each).
      const [ruleCommentDraft, setRuleCommentDraft] = useState(null);  // { ruleId, text }
      const [blockCommentDraft, setBlockCommentDraft] = useState(null); // { key, text }
      const [editingComment, setEditingComment] = useState(null);       // { scope, table, id, text }
      const [blockRangeEdit, setBlockRangeEdit] = useState(null);       // { key, start, end }

      // Auto-dismiss the toast so transient hints/errors don't linger forever.
      useEffect(() => {
        if (!toast) return;
        const id = setTimeout(() => setToast(""), 4000);
        return () => clearTimeout(id);
      }, [toast]);

      // Always reflects the doc the user is currently viewing. loadRules reads
      // it after its awaits to discard responses for a doc that's no longer
      // active (slow/out-of-order fetches must not overwrite the live rules).
      const activeDocIdRef = useRef(activeDocId);
      useEffect(() => { activeDocIdRef.current = activeDocId; }, [activeDocId]);

      const loadDocs = useCallback(async () => {
        try {
          const next = await listDocuments();
          setDocs(next);
          setActiveDocId(cur => cur || next[0]?.document_id || "");
        } catch (err) { setToast(`load docs failed: ${err.message ?? err}`); }
      }, []);

      const loadRules = useCallback(async () => {
        if (!activeDocId) return;
        const forDoc = activeDocId;
        try {
          // Rules + their annotations in one batch. Only getRulesForDocument can
          // reject; the three annotation reads swallow errors into empty Maps,
          // so a missing/just-provisioned comment table never fails the load.
          const [next, comments, overrides, blockComm] = await Promise.all([
            getRulesForDocument(forDoc, labeler?.id ?? ""),
            getRuleCommentsForDocument(forDoc),
            getSourceBlockOverridesForDocument(forDoc),
            getSourceBlockCommentsForDocument(forDoc),
          ]);
          // The viewer switches documents synchronously, but this fetch is
          // async. If the user moved on, dropping the result keeps the rules
          // panel from rendering the previous file's rules (and line numbers)
          // against the document now on screen.
          if (activeDocIdRef.current !== forDoc) return;
          setRules(next);
          setCommentsByRule(comments);
          setBlockOverrides(overrides);
          setBlockComments(blockComm);
        } catch (err) {
          if (activeDocIdRef.current !== forDoc) return;
          setToast(`load rules failed: ${err.message ?? err}`);
        } finally {
          if (activeDocIdRef.current === forDoc) setRulesLoading(false);
        }
      }, [activeDocId, labeler?.id]);

      useEffect(() => { loadDocs(); }, [loadDocs]);
      // On every document switch, immediately drop the old file's rules and any
      // expansion/selection tied to them so nothing stale paints against the
      // new document while loadRules is in flight.
      useEffect(() => {
        if (!activeDocId) return;
        setRules([]);
        setExpandedRuleId("");
        setPending(null);
        setRulesLoading(true);
        setActiveUnitKey("");
        setCommentsByRule(new Map());
        setBlockComments(new Map());
        setBlockOverrides(new Map());
        setRuleCommentDraft(null);
        setBlockCommentDraft(null);
        setEditingComment(null);
        setBlockRangeEdit(null);
      }, [activeDocId]);
      useEffect(() => { loadRules(); }, [loadRules]);
      // No background polling — the heavy per-load queries would contend with
      // in-flight writes on the single wasm connection and deadlock it. Data
      // refreshes on load, document switch, after each edit (onAfterMutate),
      // and via the top-bar refresh button.

      const activeDoc = useMemo(() => docs.find(d => d.document_id === activeDocId), [docs, activeDocId]);
      const allLines = useMemo(() => sourceLinesFromText(activeDoc?.document_text ?? ""), [activeDoc?.document_text]);

      // Source units, derived from the document text + the rules' line ranges
      // (no schema change). ruleToUnitKey lets a viewer/rule click mark the
      // owning unit active; activeUnit drives the block-span highlight.
      const units = useMemo(() => {
        const base = deriveSourceUnits(activeDoc?.document_text ?? "", rules);
        // Apply persisted range edits. The unit key stays the segmenter span
        // ("u:origStart-origEnd"), so paging/selection are stable across edits;
        // only the *displayed* range (and thus the viewer highlight) follows the
        // override. origLine* preserve the segmenter span = the block's identity
        // and the natural key for find-or-create in source_block.
        return base.map(u => {
          const ov = blockOverrides.get(u.key);
          return {
            ...u,
            origLineStart: u.lineStart,
            origLineEnd: u.lineEnd,
            lineStart: ov ? ov.lineStart : u.lineStart,
            lineEnd: ov ? ov.lineEnd : u.lineEnd,
            blockId: ov ? ov.blockId : null,
            // "edited" means the range actually diverged from the segmenter
            // span — a source_block row also exists when a block is only
            // commented on (range == original), which must NOT count as edited.
            rangeEdited: ov ? (ov.lineStart !== u.lineStart || ov.lineEnd !== u.lineEnd) : false,
          };
        });
      }, [activeDoc?.document_text, rules, blockOverrides]);
      const ruleToUnitKey = useMemo(() => {
        const m = new Map();
        for (const u of units) for (const r of u.rules) m.set(r.rule_id, u.key);
        return m;
      }, [units]);
      const activeUnit = useMemo(() => units.find(u => u.key === activeUnitKey), [units, activeUnitKey]);
      // The blocks the Prev/Next pager steps through: those with rules, plus
      // empty blocks when the labeler opts in. activeUnit itself is resolved
      // from the full `units` list, so a body-click can open an empty block even
      // when it isn't part of the paged set.
      const visibleUnits = useMemo(
        () => units.filter(u => u.rules.length > 0 || showEmptyUnits),
        [units, showEmptyUnits]
      );
      const nonEmptyUnitCount = useMemo(() => units.filter(u => u.rules.length > 0).length, [units]);

      // Keep an active block selected: default to the first paged block, and
      // re-anchor whenever the current selection isn't part of the paged set
      // (doc switch, edit, reload, toggle). A body-click can still open an empty
      // block off-set — that doesn't change `units`, so this effect won't run
      // and snap away from it. While rules are still loading every block is
      // empty (paged set empty), so we hold until the first real block appears.
      useEffect(() => {
        setActiveUnitKey(prev => {
          if (prev && visibleUnits.some(u => u.key === prev)) return prev;
          if (visibleUnits.length) return visibleUnits[0].key;
          return prev && units.some(u => u.key === prev) ? prev : "";
        });
      }, [units, visibleUnits]);

      const filteredDocs = useMemo(() => {
        const q = docQuery.trim().toLowerCase();
        return docs.filter(d => {
          if (q && !d.document_name.toLowerCase().includes(q)) return false;
          if (docFilter === "extracted" && (d.rule_count ?? 0) === 0) return false;
          return true;
        });
      }, [docs, docQuery, docFilter]);

      // Live highlight: a pending text-selection trumps the expanded rule.
      // When a labeler expands a rule in the right panel, its lines get
      // highlighted in the viewer and the viewer auto-scrolls to them.
      // Highlight priority: a live text-selection (Add Rule) trumps an expanded
      // rule's own span, which trumps the active unit's whole-block span.
      const expandedRule = rules.find(r => r.rule_id === expandedRuleId);
      const highlightStart = pending?.lineStart ?? expandedRule?.line_start ?? activeUnit?.lineStart ?? null;
      const highlightEnd   = pending?.lineEnd   ?? expandedRule?.line_end   ?? activeUnit?.lineEnd   ?? null;

      // Lines covered by any extracted rule — base light-green highlight.
      const ruleLineSet = useMemo(() => {
        const s = new Set();
        for (const r of rules) {
          for (let n = r.line_start; n <= r.line_end; n++) s.add(n);
        }
        return s;
      }, [rules]);

      // Maps each covered line → the rule that owns it, so clicking a green
      // (extracted) line in the viewer can jump to that rule. First rule in
      // document order wins when ranges overlap.
      const lineToRuleId = useMemo(() => {
        const m = new Map();
        for (const r of rules) {
          for (let n = r.line_start; n <= r.line_end; n++) {
            if (!m.has(n)) m.set(n, r.rule_id);
          }
        }
        return m;
      }, [rules]);

      const viewerBodyRef = useRef(null);
      const rulesListRef = useRef(null);
      useEffect(() => {
        const body = viewerBodyRef.current;
        if (!body || highlightStart == null) return;
        const hl = body.querySelector(`[data-line-number="${highlightStart}"]`);
        if (!hl) return;
        // Scroll ONLY the viewer body — `scrollIntoView` would bubble and
        // could pull the whole page when ancestors are also scrollable.
        const bodyRect = body.getBoundingClientRect();
        const hlRect = hl.getBoundingClientRect();
        const offsetWithinBody = hlRect.top - bodyRect.top + body.scrollTop;
        const target = offsetWithinBody - body.clientHeight / 2 + hl.clientHeight / 2;
        body.scrollTo({ top: Math.max(0, target), behavior: "smooth" });
      }, [highlightStart, activeDocId]);

      // When a rule becomes selected (e.g. by clicking its line in the viewer),
      // bring it into view in the rules panel if it's scrolled off — but leave
      // the scroll alone when it's already visible (e.g. clicked in the panel).
      useEffect(() => {
        if (!expandedRuleId) return;
        const list = rulesListRef.current;
        if (!list) return;
        const el = list.querySelector(`[data-rule-id="${expandedRuleId}"]`);
        if (!el) return;
        const listRect = list.getBoundingClientRect();
        const elRect = el.getBoundingClientRect();
        if (elRect.top >= listRect.top && elRect.bottom <= listRect.bottom) return;
        const offsetWithinList = elRect.top - listRect.top + list.scrollTop;
        const target = offsetWithinList - list.clientHeight / 2 + el.clientHeight / 2;
        list.scrollTo({ top: Math.max(0, target), behavior: "smooth" });
      }, [expandedRuleId]);

      // Track text selection on the viewer.
      function onViewerMouseUp(event) {
        const sel = window.getSelection();
        const text = sel?.toString();
        if (!text || !text.trim()) { setPending(null); return; }
        const range = sel.getRangeAt(0);
        const container = event.currentTarget;
        const findLn = (node) => {
          let cur = node;
          while (cur && cur !== container) {
            if (cur.dataset?.lineNumber) return Number(cur.dataset.lineNumber);
            cur = cur.parentNode;
          }
          return null;
        };
        const a = findLn(range.startContainer);
        const b = findLn(range.endContainer);
        if (a == null || b == null) return;
        const [s, e] = a <= b ? [a, b] : [b, a];
        setPending({ text: text.trim(), lineStart: s, lineEnd: e });
      }

      // The block that owns a given source line: the block whose span contains
      // it, else the nearest preceding block (units are sorted by lineStart).
      function unitKeyForLine(ln) {
        let preceding = null;
        for (const u of units) {
          if (ln >= u.lineStart && ln <= u.lineEnd) return u.key;
          if (u.lineStart <= ln) preceding = u;
        }
        return preceding?.key ?? units[0]?.key ?? "";
      }

      // Click a line in the source body to open its block in the right panel. A
      // drag-select is owned by the Add-Rule flow (onViewerMouseUp), so only act
      // on a plain click with no active text selection. Clicking an extracted
      // (green) line also expands that specific rule within the block.
      function onViewerClick(event) {
        const sel = window.getSelection();
        if (sel && !sel.isCollapsed && sel.toString().trim()) return;
        let cur = event.target;
        const container = event.currentTarget;
        let ln = null;
        while (cur && cur !== container) {
          if (cur.dataset?.lineNumber) { ln = Number(cur.dataset.lineNumber); break; }
          cur = cur.parentNode;
        }
        if (ln == null) return;
        setPending(null);
        const ruleId = lineToRuleId.get(ln);
        if (ruleId) {
          setExpandedRuleId(ruleId);
          const uk = ruleToUnitKey.get(ruleId);
          if (uk) setActiveUnitKey(uk);
        } else {
          setExpandedRuleId("");
          const uk = unitKeyForLine(ln);
          if (uk) setActiveUnitKey(uk);
        }
      }

      // --- Source-block paging ----------------------------------------------
      // Open a block in the panel: clear any rule selection so its whole-block
      // span drives the viewer highlight.
      function selectUnit(key) {
        setPending(null);
        setExpandedRuleId("");
        setActiveUnitKey(key);
      }
      // Step to the adjacent paged block. When the active block isn't in the
      // paged set (an empty block opened by a body-click), jump to the nearest
      // paged block in the requested direction by line position.
      function gotoAdjacentUnit(dir) {
        if (!visibleUnits.length) return;
        const cur = activeUnit;
        if (!cur) { selectUnit(visibleUnits[0].key); return; }
        const idx = visibleUnits.findIndex(u => u.key === cur.key);
        let target;
        if (idx >= 0) {
          const ni = idx + dir;
          if (ni < 0 || ni >= visibleUnits.length) return;
          target = visibleUnits[ni];
        } else {
          target = dir > 0
            ? visibleUnits.find(u => u.lineStart > cur.lineStart)
            : [...visibleUnits].reverse().find(u => u.lineStart < cur.lineStart);
        }
        if (target) selectUnit(target.key);
      }
      // Selecting a rule keeps its block marked active.
      function selectRule(r, unitKey) {
        setExpandedRuleId(r.rule_id);
        if (unitKey) setActiveUnitKey(unitKey);
      }
      // Add Rule scoped to a source unit (used for empty units — the missed-rule
      // affordance). Prefills the unit's line range and seeds the rule text with
      // the block's source so the labeler can trim it into a directive.
      function requestAddRuleForUnit(u) {
        const text = allLines.slice(u.lineStart - 1, u.lineEnd).map(l => l.text).join("\n").trim();
        setActiveUnitKey(u.key);
        setConfirmingAdd({
          text,
          lineStart: u.lineStart,
          lineEnd: u.lineEnd,
          note: "",
          PREREQUISITE: "",
          ENFORCEMENT: "",
          TRIGGERS: "",
          AMBIGUITY: "",
          AMBIGUITY_LEVEL: "none",
        });
      }

      // Step 1: clicking Add Rule. Always allowed; if there's a current text
      // selection, open the add-rule modal seeded with the selection plus
      // empty note + classification-axis drafts. Otherwise nudge the user to
      // make a selection first.
      function requestAddRule() {
        if (!pending) {
          setToast("Select text in the viewer first, then click Add Rule.");
          return;
        }
        setConfirmingAdd({
          text: pending.text,
          lineStart: pending.lineStart,
          lineEnd: pending.lineEnd,
          note: "",
          PREREQUISITE: "",
          ENFORCEMENT: "",
          TRIGGERS: "",
          AMBIGUITY: "",
          AMBIGUITY_LEVEL: "none",
        });
      }
      // Step 2: confirming the add. Three writes in order: (1) INSERT the rule
      // + auto-accept extraction label, (2) save the human-filled axes as this
      // labeler's classification label (no LLM prediction), (3) best-effort log
      // the note on the source file. The note write is wrapped so a failure
      // there never discards the rule we already inserted.
      async function confirmAddRule() {
        if (!confirmingAdd || !labeler || !activeDoc) return;
        const c = confirmingAdd;
        const ruleText = (c.text ?? "").trim();
        if (!ruleText) { setToast("Rule text can't be empty."); return; }
        const toList = (v) => (v ?? "").split("\n").map(s => s.trim()).filter(Boolean);
        try {
          const newId = await addRule({
            rulesFileId: activeDoc.document_id,
            ruleText,
            lineStart: c.lineStart,
            lineEnd: c.lineEnd,
            labelerId: labeler.id,
          });
          // Manual axes → corrected_* with decision='accept'. An empty
          // predictions Map binds every predicted_* (incl. the FK
          // predicted_decision_id) to NULL, which the FK guard requires.
          await saveClassificationLabel({
            ruleId: newId,
            labelerId: labeler.id,
            corrected: {
              prerequisites: toList(c.PREREQUISITE),
              enforcement_mechanisms: toList(c.ENFORCEMENT),
              triggers: toList(c.TRIGGERS),
              ambiguity_level: c.AMBIGUITY_LEVEL || null,
              ambiguity_notes: (c.AMBIGUITY ?? "").trim() || null,
            },
            predictions: new Map(),
          });
          let noteOk = true;
          const snippet = ruleText.replace(/\s+/g, " ");
          const entry = `[skipped_rule] L${c.lineStart}–${c.lineEnd} | ${(c.note ?? "").trim() || "(no note)"} | ${snippet}`;
          try {
            await appendMissedRuleNote({ rulesFileId: activeDoc.document_id, entry });
          } catch (noteErr) {
            noteOk = false;
            setToast(`Rule added; note not saved: ${noteErr.message ?? noteErr}`);
          }
          if (noteOk) setToast(`Added rule from L${c.lineStart}–${c.lineEnd}`);
          setConfirmingAdd(null);
          setPending(null);
          window.getSelection()?.removeAllRanges();
          await loadRules();
        } catch (err) { setToast(`add failed: ${err.message ?? err}`); }
      }

      async function saveRuleEdit(rule, next) {
        if (!labeler) return;
        try {
          await updateRule({
            ruleId: rule.rule_id,
            ruleText: next.ruleText,
          });
          setToast("Saved rule edit");
          setEditMode(null);
          await loadRules();
        } catch (err) { setToast(`save failed: ${err.message ?? err}`); }
      }

      // Hard-delete a rule from the DB (all child rows + the rule itself).
      async function confirmDeleteRule(rule) {
        if (!labeler) return;
        try {
          await deleteRule({ ruleId: rule.rule_id });
          setToast("Deleted rule");
          setDeletingRuleId("");
          if (expandedRuleId === rule.rule_id) setExpandedRuleId("");
          if (editMode?.ruleId === rule.rule_id) setEditMode(null);
          await loadRules();
        } catch (err) { setToast(`delete failed: ${err.message ?? err}`); }
      }

      // --- Comment + block-range handlers. Each write reloads via loadRules
      // (which re-reads rules + all annotations), matching the rule edit flow. ---
      async function submitRuleComment() {
        if (!ruleCommentDraft || !labeler) return;
        const body = (ruleCommentDraft.text ?? "").trim();
        if (!body) { setToast("Comment can't be empty."); return; }
        // Capture the rule's stable anchor (file + source span) so the comment
        // survives the next re-extraction, which reassigns the rule's UUID.
        const r = rules.find(x => x.rule_id === ruleCommentDraft.ruleId);
        try {
          await addRuleComment({
            ruleId: ruleCommentDraft.ruleId,
            rulesFileId: r?.rules_file_id ?? activeDoc?.document_id ?? null,
            lineStart: r?.line_start ?? null,
            lineEnd: r?.line_end ?? null,
            labelerId: labeler.id, body,
          });
          setRuleCommentDraft(null);
          await loadRules();
        } catch (err) { setToast(`comment failed: ${err.message ?? err}`); }
      }
      async function submitBlockComment() {
        if (!blockCommentDraft || !labeler || !activeDoc) return;
        const u = activeUnit;
        if (!u || u.key !== blockCommentDraft.key) return;
        const body = (blockCommentDraft.text ?? "").trim();
        if (!body) { setToast("Comment can't be empty."); return; }
        try {
          const blockId = await ensureSourceBlock({
            rulesFileId: activeDoc.document_id,
            origStart: u.origLineStart, origEnd: u.origLineEnd,
            lineStart: u.lineStart, lineEnd: u.lineEnd, kind: null, snippet: u.snippet,
          });
          await addBlockComment({ blockId, labelerId: labeler.id, body });
          setBlockCommentDraft(null);
          await loadRules();
        } catch (err) { setToast(`comment failed: ${err.message ?? err}`); }
      }
      async function submitCommentEdit() {
        if (!editingComment) return;
        const body = (editingComment.text ?? "").trim();
        if (!body) { setToast("Comment can't be empty."); return; }
        try {
          await updateCommentBody({ table: editingComment.table, id: editingComment.id, body });
          setEditingComment(null);
          await loadRules();
        } catch (err) { setToast(`edit failed: ${err.message ?? err}`); }
      }
      async function removeComment(table, id) {
        try {
          await deleteCommentRow({ table, id });
          if (editingComment?.id === id) setEditingComment(null);
          await loadRules();
        } catch (err) { setToast(`delete failed: ${err.message ?? err}`); }
      }
      async function submitBlockRange() {
        if (!blockRangeEdit || !activeDoc) return;
        const u = activeUnit;
        if (!u || u.key !== blockRangeEdit.key) return;
        const start = Number(blockRangeEdit.start), end = Number(blockRangeEdit.end);
        if (!Number.isInteger(start) || !Number.isInteger(end) || start < 1 || end < start) {
          setToast("Enter a valid line range (start ≤ end)."); return;
        }
        try {
          const blockId = await ensureSourceBlock({
            rulesFileId: activeDoc.document_id,
            origStart: u.origLineStart, origEnd: u.origLineEnd,
            lineStart: u.lineStart, lineEnd: u.lineEnd, kind: null, snippet: u.snippet,
          });
          await updateSourceBlockRange({ blockId, lineStart: start, lineEnd: end });
          setBlockRangeEdit(null);
          await loadRules();
        } catch (err) { setToast(`range save failed: ${err.message ?? err}`); }
      }

      // Existing comments for a rule or block. table is the fixed source table
      // ('rule_comment' | 'source_block_comment'); a labeler may edit/delete
      // only their own rows (compared by labeler_id).
      const renderCommentList = (list, table) => {
        if (!list || !list.length) return null;
        return html`
          <div className="comment-list">
            ${list.map(c => {
              const isEd = editingComment?.id === c.id;
              return html`
                <div key=${c.id} className="comment-item">
                  <div className="comment-head">
                    <span className="comment-author">${c.author}</span>
                    <span className="comment-date">${c.created_at}</span>
                  </div>
                  ${isEd ? html`
                    <textarea className="comment-textarea" value=${editingComment.text}
                      onChange=${e => setEditingComment({ ...editingComment, text: e.target.value })} />
                    <div className="comment-actions">
                      <button onClick=${() => setEditingComment(null)}>Cancel</button>
                      <button className="primary" onClick=${submitCommentEdit}>Save</button>
                    </div>
                  ` : html`
                    <p className="comment-body">${c.body}</p>
                    <div className="comment-actions">
                      <button className="comment-icon-btn" title="Edit comment" aria-label="Edit comment"
                        onClick=${() => setEditingComment({ table, id: c.id, text: c.body })}>
                        <${PenLineIcon} size=${13} />
                      </button>
                      <button className="comment-icon-btn danger" title="Delete comment" aria-label="Delete comment"
                        onClick=${() => removeComment(table, c.id)}>
                        <${TrashIcon} size=${13} />
                      </button>
                    </div>
                  `}
                </div>
              `;
            })}
          </div>
        `;
      };

      // A single rule row — selectable, expandable, with Change Rule / Delete.
      // Rendered as a child inside its source unit; unitKey keeps that unit
      // marked active when this rule is selected.
      const renderRuleItem = (r, unitKey) => {
        const isExpanded = r.rule_id === expandedRuleId;
        const isEditing = editMode?.ruleId === r.rule_id;
        // Comments are keyed by source span (stable across re-extraction), not
        // the rule UUID — see getRuleCommentsForDocument.
        const cmts = commentsByRule.get(`${r.line_start}-${r.line_end}`) || [];
        return html`
          <div key=${r.rule_id} data-rule-id=${r.rule_id}
               className=${`rule-item${isExpanded ? " expanded" : ""}`}
               onClick=${() => !isExpanded && selectRule(r, unitKey)}>
            <div className="rule-item-summary"
                 onClick=${() => isExpanded && setExpandedRuleId("")}>
              <div className="rule-item-summary-content">
                <span className="rule-item-text">${r.rule_text}</span>
                <span className="rule-item-meta">
                  <span className=${`rule-type-badge ${r.rule_type === "context" ? "context" : "rule"}`}>${r.rule_type === "context" ? "context" : "rule"}</span>
                  Lines ${r.line_start}–${r.line_end}
                  ${cmts.length > 0 && html`<span className="comment-count" title=${`${cmts.length} comment(s)`}><${CommentIcon} size=${11} /> ${cmts.length}</span>`}
                </span>
              </div>
              ${isExpanded ? html`<${ChevronDown} size=${14} />` : html`<${ChevronRight} size=${14} />`}
            </div>
            ${isExpanded && html`
              <div className="rule-expanded-detail">
                <div className="rule-uuid-row">
                  <span className="rule-uuid-label">RULE UUID</span>
                  <span className="rule-uuid-value">#${r.rule_id.slice(0, 8)}</span>
                </div>
                ${r.extraction_reason && html`
                  <div className="rule-reason-box">
                    <span className="caption">WHY EXTRACTED</span>
                    <p className="rule-reason-text">${r.extraction_reason}</p>
                  </div>
                `}
                ${r.execution_guidance && html`
                  <div className="rule-reason-box">
                    <span className="caption">EXECUTION GUIDANCE</span>
                    <p className="rule-reason-text">${r.execution_guidance}</p>
                  </div>
                `}
                ${isEditing && html`
                  <div className="rule-text-box">
                    <span className="caption">RULE TEXT</span>
                    <textarea value=${editMode.ruleText}
                      onChange=${e => setEditMode({ ...editMode, ruleText: e.target.value })} />
                  </div>
                `}
                <div className="rule-actions-row">
                  ${isEditing ? html`
                    <button onClick=${() => setEditMode(null)}>Cancel</button>
                    <button className="primary" onClick=${() => saveRuleEdit(r, editMode)}>
                      Save
                    </button>
                  ` : deletingRuleId === r.rule_id ? html`
                    <span className="delete-confirm-text">Delete this rule from the database?</span>
                    <button onClick=${() => setDeletingRuleId("")}>Cancel</button>
                    <button className="danger-btn" onClick=${() => confirmDeleteRule(r)}>
                      <${TrashIcon} size=${12} /> Delete
                    </button>
                  ` : html`
                    <button className="add-rule-btn" onClick=${() => { setDeletingRuleId(""); setEditMode({
                      ruleId: r.rule_id,
                      ruleText: r.rule_text,
                    }); }}>
                      <${PenLineIcon} size=${12} /> Change Rule
                    </button>
                    <button className="danger-btn ghost"
                      title="Delete this rule from the database"
                      onClick=${() => { setEditMode(null); setDeletingRuleId(r.rule_id); }}>
                      <${TrashIcon} size=${12} /> Delete
                    </button>
                  `}
                </div>
                <div className="rule-comments">
                  ${renderCommentList(cmts, "rule_comment")}
                  ${ruleCommentDraft?.ruleId === r.rule_id ? html`
                    <div className="comment-compose">
                      <textarea className="comment-textarea" placeholder="Add a comment…"
                        value=${ruleCommentDraft.text}
                        onChange=${e => setRuleCommentDraft({ ...ruleCommentDraft, text: e.target.value })} />
                      <div className="comment-actions">
                        <button onClick=${() => setRuleCommentDraft(null)}>Cancel</button>
                        <button className="primary" onClick=${submitRuleComment}>Comment</button>
                      </div>
                    </div>
                  ` : html`
                    <button className="comment-toggle-btn"
                      onClick=${() => { setEditingComment(null); setRuleCommentDraft({ ruleId: r.rule_id, text: "" }); }}>
                      <${CommentIcon} size=${13} /> Comment
                    </button>
                  `}
                </div>
              </div>
            `}
          </div>
        `;
      };

      // Pager position for the active block within the paged set. A negative
      // index means the active block is an empty one opened by a body-click and
      // not part of the paged set; Prev/Next still reach the nearest neighbors.
      const navIndex = visibleUnits.findIndex(u => u.key === activeUnitKey);
      const canPrev = !!activeUnit && (navIndex > 0 || (navIndex < 0 && visibleUnits.some(u => u.lineStart < activeUnit.lineStart)));
      const canNext = !!activeUnit && (navIndex >= 0 ? navIndex < visibleUnits.length - 1 : visibleUnits.some(u => u.lineStart > activeUnit.lineStart));
      const positionLabel = navIndex >= 0
        ? `Block ${navIndex + 1} of ${visibleUnits.length}`
        : activeUnit ? "Empty block" : "—";
      // Active block's annotations: persisted comments + whether its range was
      // actually edited (rangeEdited is false for comment-only source_block rows).
      const blockCmts = activeUnit ? (blockComments.get(activeUnit.key) || []) : [];
      const blockEdited = !!activeUnit?.rangeEdited;

      if (!labeler) {
        return html`<main className="empty-state">Pick a labeler in the top bar to start.</main>`;
      }

      return html`
        <main className="workbench extraction">
          <aside className="sidebar">
            <div className="sidebar-controls">
              <div className="search-input">
                <${SearchIcon} size=${14} />
                <input placeholder="Search files..." value=${docQuery}
                  onChange=${e => setDocQuery(e.target.value)} />
              </div>
              <div className="filter-row">
                <div className="dropdown-pill">
                  <select value=${docFilter} onChange=${e => setDocFilter(e.target.value)}>
                    <option value="all">All</option>
                    <option value="extracted">Extracted</option>
                  </select>
                  <${ChevronDown} size=${14} />
                </div>
                <span className="count-label">${filteredDocs.length} file${filteredDocs.length === 1 ? "" : "s"}</span>
              </div>
            </div>
            <div className="sidebar-divider"></div>
            <div className="sidebar-list">
              ${filteredDocs.map(d => html`
                <button key=${d.document_id}
                  className=${`file-item${d.document_id === activeDocId ? " active" : ""}`}
                  onClick=${() => setActiveDocId(d.document_id)}>
                  <span className="filename">${d.document_name ?? d.source_path.split("/").pop()}</span>
                  <span className="rule-count-badge">${d.rule_count} rule${d.rule_count === 1 ? "" : "s"}</span>
                </button>
              `)}
            </div>
          </aside>

          <section className="viewer">
            <div className="viewer-header">
              <div className="viewer-filename">${activeDoc?.document_name ?? activeDoc?.source_path?.split("/").pop() ?? "—"}</div>
              <div className="breadcrumb">${activeDoc?.breadcrumb ?? ""}</div>
              ${activeDoc?.github_url && html`
                <a className="gh-btn" href=${activeDoc.github_url} target="_blank" rel="noreferrer noopener">
                  <${GithubIcon} size=${14} /> View file
                </a>
              `}
              ${activeDoc?.repo_url && html`
                <a className="gh-btn" href=${activeDoc.repo_url} target="_blank" rel="noreferrer noopener"
                   title="Repo landing page — always resolves, even if the file link 404s">
                  <${GithubIcon} size=${14} /> Repo
                </a>
              `}
            </div>
            <div className="viewer-body" ref=${viewerBodyRef} onMouseUp=${onViewerMouseUp} onClick=${onViewerClick}>
              ${allLines.map(l => {
                const isHl = highlightStart != null && l.line_number >= highlightStart && l.line_number <= highlightEnd;
                const isRule = ruleLineSet.has(l.line_number);
                return [
                  html`<span key=${"n" + l.line_number} className="ln">${l.line_number}</span>`,
                  html`<div key=${"c" + l.line_number} data-line-number=${String(l.line_number)}
                         className=${`code-line${isRule ? " rule-line" : ""}${isHl ? " highlight" : ""}`}>${l.text || " "}</div>`,
                ];
              })}
            </div>
            <div className="status-bar">
              <${FileTextIcon} size=${12} />
              <span>${activeDoc?.source_path?.split("/").pop() ?? "—"}</span>
              <span className="divider">·</span>
              <span>${allLines.length} line${allLines.length === 1 ? "" : "s"}</span>
              <span className="spacer"></span>
              ${pending && html`
                <span><${TextSelectIcon} size=${12} /></span>
                <span className="sel-info">Lines ${pending.lineStart}–${pending.lineEnd} selected</span>
                <span className="divider">·</span>
              `}
              <span>Read-only</span>
            </div>
          </section>

          <aside className="rules-panel">
            <div className="rules-panel-header">
              <div className="header-top">
                <h2>Extracted Rules</h2>
                <button className="add-rule-btn"
                  onClick=${requestAddRule}
                  title=${pending ? `Add rule from L${pending.lineStart}–${pending.lineEnd}` : "Select text in the viewer, then click Add Rule"}>
                  <${PlusIcon} size=${14} /> Add Rule
                </button>
              </div>
              <div className="header-meta">
                <span>${rules.length} rule${rules.length === 1 ? "" : "s"} · ${nonEmptyUnitCount} block${nonEmptyUnitCount === 1 ? "" : "s"}</span>
                <label className="empty-toggle">
                  <input type="checkbox" checked=${showEmptyUnits}
                    onChange=${e => setShowEmptyUnits(e.target.checked)} />
                  Show empty blocks
                </label>
              </div>
            </div>
            ${activeUnit && html`
              <div className="block-subhead">
                <div className="block-subhead-top">
                  <div className="block-subhead-main">
                    <span className="block-snippet">${activeUnit.snippet}</span>
                    <span className="block-lines">
                      Lines ${activeUnit.lineStart}–${activeUnit.lineEnd}
                      ${blockEdited && html`<span className="block-edited" title=${`Range edited (segmenter span: ${activeUnit.origLineStart}–${activeUnit.origLineEnd})`}>· edited</span>`}
                    </span>
                  </div>
                  ${activeUnit.rules.length > 0 && html`
                    <span className=${`unit-rollup${activeUnit.rules.every(r => r.my_extraction_decision) ? " complete" : ""}`}>
                      ${activeUnit.rules.filter(r => r.my_extraction_decision).length}/${activeUnit.rules.length} labeled
                    </span>
                  `}
                </div>
                ${blockRangeEdit?.key === activeUnit.key ? html`
                  <div className="block-range-edit">
                    <label>Start <input type="number" min="1" value=${blockRangeEdit.start}
                      onChange=${e => setBlockRangeEdit({ ...blockRangeEdit, start: e.target.value })} /></label>
                    <label>End <input type="number" min="1" value=${blockRangeEdit.end}
                      onChange=${e => setBlockRangeEdit({ ...blockRangeEdit, end: e.target.value })} /></label>
                    <button onClick=${() => setBlockRangeEdit(null)}>Cancel</button>
                    <button className="primary" onClick=${submitBlockRange}>Save range</button>
                  </div>
                ` : html`
                  <div className="block-subhead-actions">
                    <button className="block-action-btn"
                      onClick=${() => { setBlockCommentDraft(null); setBlockRangeEdit({ key: activeUnit.key, start: activeUnit.lineStart, end: activeUnit.lineEnd }); }}>
                      <${PenLineIcon} size=${12} /> Edit range
                    </button>
                    <button className="block-action-btn"
                      onClick=${() => { setEditingComment(null); setBlockRangeEdit(null); setBlockCommentDraft({ key: activeUnit.key, text: "" }); }}>
                      <${CommentIcon} size=${12} /> Comment${blockCmts.length ? ` (${blockCmts.length})` : ""}
                    </button>
                  </div>
                `}
                ${(blockCmts.length > 0 || blockCommentDraft?.key === activeUnit.key) && html`
                  <div className="block-comments">
                    ${renderCommentList(blockCmts, "source_block_comment")}
                    ${blockCommentDraft?.key === activeUnit.key && html`
                      <div className="comment-compose">
                        <textarea className="comment-textarea" placeholder="Comment on this source block…"
                          value=${blockCommentDraft.text}
                          onChange=${e => setBlockCommentDraft({ ...blockCommentDraft, text: e.target.value })} />
                        <div className="comment-actions">
                          <button onClick=${() => setBlockCommentDraft(null)}>Cancel</button>
                          <button className="primary" onClick=${submitBlockComment}>Comment</button>
                        </div>
                      </div>
                    `}
                  </div>
                `}
              </div>
            `}
            <div className="rules-list" ref=${rulesListRef}>
              ${rulesLoading
                ? html`<div className="empty-state">Loading rules…</div>`
                : rules.length === 0
                  ? html`<div className="empty-state">No rules in this file yet.</div>`
                  : !activeUnit
                    ? html`<div className="empty-state">Click a block in the source to see its rules.</div>`
                    : activeUnit.rules.length === 0
                      ? html`<div className="empty-state block-empty">
                          <p>No rules extracted from this block.</p>
                          <button className="add-rule-btn" onClick=${() => requestAddRuleForUnit(activeUnit)}>
                            <${PlusIcon} size=${14} /> Add rule from this block
                          </button>
                        </div>`
                      : activeUnit.rules.map(r => renderRuleItem(r, activeUnit.key))}
            </div>
            <div className="block-pager">
              <button className="block-nav-btn" disabled=${!canPrev}
                onClick=${() => gotoAdjacentUnit(-1)} title="Previous block">
                <${ChevronLeft} size=${16} /> Prev
              </button>
              <span className="block-position">${positionLabel}</span>
              <button className="block-nav-btn" disabled=${!canNext}
                onClick=${() => gotoAdjacentUnit(1)} title="Next block">
                Next <${ChevronRight} size=${16} />
              </button>
            </div>
          </aside>

          ${confirmingAdd && html`
            <div className="modal-overlay" onClick=${() => setConfirmingAdd(null)}>
              <div className="modal-card" onClick=${e => e.stopPropagation()}>
                <div className="modal-header">
                  <h3>Add missing rule</h3>
                  <span className="modal-sub">Lines ${confirmingAdd.lineStart}–${confirmingAdd.lineEnd} · not extracted by the agent</span>
                </div>
                <div className="modal-body">
                  <label className="modal-field">
                    <span className="modal-label">RULE TEXT</span>
                    <textarea className="modal-textarea" rows=${3}
                      value=${confirmingAdd.text}
                      onChange=${e => setConfirmingAdd({ ...confirmingAdd, text: e.target.value })} />
                  </label>
                  <label className="modal-field">
                    <span className="modal-label">NOTE <span className="modal-hint">— logged on the source file as a skipped rule</span></span>
                    <textarea className="modal-textarea" rows=${2}
                      placeholder="Why did the extractor miss this? Anything reviewers should know…"
                      value=${confirmingAdd.note}
                      onChange=${e => setConfirmingAdd({ ...confirmingAdd, note: e.target.value })} />
                  </label>
                  <div className="modal-axes-title">Classification — fill what you can</div>
                  <div className="modal-axes-grid">
                    <label className="modal-field">
                      <span className="modal-label">PREREQUISITES <span className="modal-hint">one per line</span></span>
                      <textarea className="modal-textarea" rows=${2}
                        value=${confirmingAdd.PREREQUISITE}
                        onChange=${e => setConfirmingAdd({ ...confirmingAdd, PREREQUISITE: e.target.value })} />
                    </label>
                    <label className="modal-field">
                      <span className="modal-label">ENFORCEMENT <span className="modal-hint">one per line</span></span>
                      <textarea className="modal-textarea" rows=${2}
                        value=${confirmingAdd.ENFORCEMENT}
                        onChange=${e => setConfirmingAdd({ ...confirmingAdd, ENFORCEMENT: e.target.value })} />
                    </label>
                    <label className="modal-field">
                      <span className="modal-label">TRIGGERS <span className="modal-hint">one per line</span></span>
                      <textarea className="modal-textarea" rows=${2}
                        value=${confirmingAdd.TRIGGERS}
                        onChange=${e => setConfirmingAdd({ ...confirmingAdd, TRIGGERS: e.target.value })} />
                    </label>
                    <label className="modal-field">
                      <span className="modal-label">AMBIGUITY LEVEL</span>
                      <select className="modal-select" value=${confirmingAdd.AMBIGUITY_LEVEL}
                        onChange=${e => setConfirmingAdd({ ...confirmingAdd, AMBIGUITY_LEVEL: e.target.value })}>
                        <option value="none">none</option>
                        <option value="low">low</option>
                        <option value="medium">medium</option>
                        <option value="high">high</option>
                      </select>
                    </label>
                  </div>
                  <label className="modal-field">
                    <span className="modal-label">AMBIGUITY NOTES</span>
                    <textarea className="modal-textarea" rows=${2}
                      placeholder="What specifically is ambiguous?"
                      value=${confirmingAdd.AMBIGUITY}
                      onChange=${e => setConfirmingAdd({ ...confirmingAdd, AMBIGUITY: e.target.value })} />
                  </label>
                </div>
                <div className="modal-actions">
                  <button onClick=${() => setConfirmingAdd(null)}>Cancel</button>
                  <button className="primary" onClick=${confirmAddRule}>Confirm & save</button>
                </div>
              </div>
            </div>
          `}
          ${toast && html`<div className="toast">${toast}</div>`}
        </main>
      `;
    }

    // =================================================================
    // ClassificationPage — 2-pane (Rules sidebar / Form + Save/Skip)
    // =================================================================
    const AXES = [
      { key: "PREREQUISITE", llmKey: "prerequisites",          correctedKey: "corrected_prerequisites",          field: "corrected_prerequisites",          isList: true,  prompt: "What information is needed to enforce this rule?" },
      { key: "ENFORCEMENT",  llmKey: "enforcement_mechanisms", correctedKey: "corrected_enforcement_mechanisms", field: "corrected_enforcement_mechanisms", isList: true,  prompt: "What mechanism enforces this rule?" },
      { key: "TRIGGERS",     llmKey: "triggers",               correctedKey: "corrected_triggers",               field: "corrected_triggers",               isList: true,  prompt: "When/where is this rule triggered?" },
      { key: "AMBIGUITY",    llmKey: "ambiguity_notes",        correctedKey: "corrected_ambiguity_notes",        field: "corrected_ambiguity_notes",        isList: false, prompt: "What needs to be defined by the user? How ambiguous is this rule?" },
    ];

    function ClassificationPage() {
      const { current: labeler } = useIdentity();
      const [items, setItems] = useState([]);
      const [predictions, setPredictions] = useState(new Map());
      const [statusFilter, setStatusFilter] = useState("all");
      const [search, setSearch] = useState("");
      const [selectedRuleId, setSelectedRuleId] = useState("");
      const [expanded, setExpanded] = useState({ PREREQUISITE: true, ENFORCEMENT: false, TRIGGERS: false, AMBIGUITY: false });
      const [toast, setToast] = useState(null);
      const notify = useCallback((kind, msg) => setToast({ kind, msg, t: Date.now() }), []);
      useEffect(() => {
        if (!toast) return;
        const id = setTimeout(() => {
          setToast(cur => (cur && cur.t === toast.t ? null : cur));
        }, toast.kind === "error" ? 5000 : 2500);
        return () => clearTimeout(id);
      }, [toast]);

      const loadItems = useCallback(async () => {
        try {
          const [next, preds] = await Promise.all([getAllClassificationItems(), getClassificationPredictions()]);
          setItems(next);
          setPredictions(preds);
          setSelectedRuleId(cur => cur || next[0]?.rule_id || "");
        } catch (err) { notify("error", `Load failed: ${err.message ?? err}`); }
      }, [notify]);

      useEffect(() => { loadItems(); }, [loadItems]);
      // No background polling (see ExtractionPage note) — getAllClassificationItems
      // is heavy and would deadlock against in-flight saves. Refresh on load
      // and via the top-bar refresh button.

      // After a save/skip we update local state in place rather than re-running
      // the heavy getAllClassificationItems — that post-write reload was racing
      // the save on the single wasm connection and hanging it.
      const applyLocalLabel = useCallback((ruleId, decision, corrected) => {
        setItems(prev => prev.map(it => {
          if (it.rule_id !== ruleId) return it;
          const others = it.labels.filter(l => l.labeler_id !== labeler?.id);
          return {
            ...it,
            labels: [
              {
                rule_id: ruleId,
                labeler_id: labeler?.id,
                labeler_handle: labeler?.handle,
                decision,
                predicted_prerequisites: [], predicted_enforcement_mechanisms: [], predicted_triggers: [],
                predicted_ambiguity_level: null, predicted_ambiguity_notes: "",
                corrected_prerequisites: corrected?.prerequisites ?? null,
                corrected_enforcement_mechanisms: corrected?.enforcement_mechanisms ?? null,
                corrected_triggers: corrected?.triggers ?? null,
                corrected_ambiguity_level: corrected?.ambiguity_level ?? null,
                corrected_ambiguity_notes: corrected?.ambiguity_notes ?? null,
              },
              ...others,
            ],
          };
        }));
      }, [labeler?.id, labeler?.handle]);

      const filtered = useMemo(() => {
        const q = search.trim().toLowerCase();
        return items.filter(item => {
          if (q && !item.rule_text.toLowerCase().includes(q) && !item.rule_id.toLowerCase().includes(q)) return false;
          if (statusFilter === "all") return true;
          const myLabel = item.labels.find(l => l.labeler_id === labeler?.id);
          // A rule is "labeled by me" only when I clicked Save Classification.
          // Skip and unsaved drafts do not count.
          const isLabeled = myLabel?.decision === "accept";
          return statusFilter === "labeled" ? isLabeled : !isLabeled;
        });
      }, [items, search, statusFilter, labeler?.id]);

      const selected = useMemo(
        () => filtered.find(i => i.rule_id === selectedRuleId) ?? filtered[0],
        [filtered, selectedRuleId]
      );

      function advance(direction = 1) {
        const idx = filtered.findIndex(i => i.rule_id === selectedRuleId);
        const nextIdx = idx + direction;
        const next = filtered[nextIdx >= 0 && nextIdx < filtered.length ? nextIdx : idx];
        if (next) setSelectedRuleId(next.rule_id);
      }

      if (!labeler) {
        return html`<main className="empty-state">Pick a labeler in the top bar to start.</main>`;
      }

      return html`
        <main className="workbench classification">
          <aside className="sidebar">
            <div className="sidebar-controls">
              <div className="search-input">
                <${SearchIcon} size=${16} />
                <input placeholder="Search by text or UUID..."
                  value=${search} onChange=${e => setSearch(e.target.value)} />
              </div>
              <div className="filter-row">
                <div className="dropdown-pill">
                  <select value=${statusFilter} onChange=${e => setStatusFilter(e.target.value)}>
                    <option value="all">All</option>
                    <option value="labeled">Labeled by me</option>
                    <option value="unlabeled">Unlabeled by me</option>
                  </select>
                  <${ChevronDown} size=${14} />
                </div>
                <span className="count-label">${filtered.length} items</span>
              </div>
            </div>
            <div className="sidebar-divider"></div>
            <div className="sidebar-list">
              ${filtered.length === 0 && html`<div className="empty-state">No rules match.</div>`}
              ${filtered.map(item => {
                const my = item.labels.find(l => l.labeler_id === labeler.id);
                const labeled = my?.decision === "accept";
                return html`
                  <button key=${item.rule_id}
                    className=${`class-rule-item${item.rule_id === selected?.rule_id ? " active" : ""}`}
                    onClick=${() => setSelectedRuleId(item.rule_id)}>
                    <span className="text">${item.rule_text}</span>
                    <span className="status-row">
                      <span className=${`status-badge ${labeled ? "labeled" : "unlabeled"}`}>
                        ${labeled ? "labeled" : "unlabeled"}
                      </span>
                      <span className="source-file">${item.short_filename}</span>
                    </span>
                  </button>
                `;
              })}
            </div>
          </aside>

          ${selected ? html`<${ClassificationForm}
              key=${selected.rule_id}
              item=${selected}
              labelerId=${labeler.id}
              predictions=${predictions}
              expanded=${expanded}
              setExpanded=${setExpanded}
              onLocalLabel=${applyLocalLabel}
              onAdvance=${advance}
              notify=${notify}
            />` : html`<section className="class-main empty-state">No items.</section>`}

          ${toast && html`<div className=${`toast ${toast.kind}`}>${toast.msg}</div>`}
        </main>
      `;
    }


    function summarizePrediction(pred, axisKey) {
      if (!pred) return "—";
      const v = pred[axisKey];
      if (Array.isArray(v)) return v.length ? v.join(", ") : "—";
      return v || "—";
    }

    function pickHighlightedSnippet(text, startLine, endLine) {
      if (!text) return [];
      const all = text.replace(/\r/g, "").split("\n");
      return all.map((line, i) => ({
        line_number: i + 1,
        text: line,
        highlight: (i + 1) >= startLine && (i + 1) <= endLine,
      }));
    }

    function ClassificationForm({ item, labelerId, predictions, expanded, setExpanded, onLocalLabel, onAdvance, notify }) {
      const myLabel = item.labels.find(l => l.labeler_id === labelerId);
      const codeSnippet = useMemo(
        () => pickHighlightedSnippet(item.document_text, item.line_start, item.line_end),
        [item.document_text, item.line_start, item.line_end]
      );

      function formatList(v) { return (v ?? []).join("\n"); }
      function parseList(v) { return (v ?? "").split("\n").map(s => s.trim()).filter(Boolean); }

      // Initial draft = whatever this labeler previously committed for this
      // rule, or empty. We intentionally do NOT fall back to the LLM
      // prediction — that lives in its own "LLM Judge" box and pre-filling
      // the note field with it would force every labeler to re-edit. The
      // form remounts (via key=rule_id in the parent) when you switch
      // rules, so useState's lazy initializer reads fresh values then.
      const initial = useMemo(() => ({
        PREREQUISITE:    formatList(myLabel?.corrected_prerequisites          ?? []),
        ENFORCEMENT:     formatList(myLabel?.corrected_enforcement_mechanisms ?? []),
        TRIGGERS:        formatList(myLabel?.corrected_triggers               ?? []),
        AMBIGUITY:       myLabel?.corrected_ambiguity_notes ?? "",
        AMBIGUITY_LEVEL: myLabel?.corrected_ambiguity_level ?? "none",
      }), [item.rule_id, myLabel?.updated_at]);
      const [draft, setDraft] = useState(initial);
      // No `useEffect(setDraft(initial), [initial])` reset: polling refreshes
      // myLabel.updated_at as a new Date reference every cycle, which would
      // bust the dep check and overwrite whatever the labeler had typed.
      // The form already remounts on rule switch via key=rule_id, which is
      // the only time we actually want the draft to re-initialize.

      // Axis edits are LOCAL state only — they do NOT hit the DB until the
      // labeler clicks "Save Classification". rule_classification_label thus
      // only reflects what each labeler has explicitly committed (or skipped).
      function patchAxis(axisKey, text) {
        setDraft(cur => ({ ...cur, [axisKey]: text }));
      }
      function patchAmbiguityLevel(level) {
        setDraft(cur => ({ ...cur, AMBIGUITY_LEVEL: level }));
      }

      // idle | saving | success | error — drives the Save button visual.
      const [saveState, setSaveState] = useState("idle");
      useEffect(() => {
        if (saveState !== "success" && saveState !== "error") return;
        const id = setTimeout(() => setSaveState("idle"), 1800);
        return () => clearTimeout(id);
      }, [saveState]);

      // "Save Classification" — commits every corrected_* axis + decision in
      // a single INSERT … ON CONFLICT DO UPDATE (saveClassificationLabel).
      async function saveClassification() {
        if (saveState === "saving") return;
        setSaveState("saving");
        const corrected = {
          prerequisites: parseList(draft.PREREQUISITE),
          enforcement_mechanisms: parseList(draft.ENFORCEMENT),
          triggers: parseList(draft.TRIGGERS),
          ambiguity_level: draft.AMBIGUITY_LEVEL || null,
          ambiguity_notes: draft.AMBIGUITY || null,
        };
        try {
          await saveClassificationLabel({ ruleId: item.rule_id, labelerId, corrected, predictions });
          setSaveState("success");
          notify("success", `Saved classification (${item.rule_text.slice(0, 40)}…)`);
          // Optimistic local update instead of a heavy re-query (which would
          // race the write on the single connection). Then advance.
          onLocalLabel(item.rule_id, "accept", corrected);
          onAdvance(1);
        } catch (err) {
          setSaveState("error");
          notify("error", `Save failed: ${err.message ?? err}`);
        }
      }

      // Skip — only writes the decision; does NOT persist draft edits.
      async function skip() {
        try {
          await skipClassificationLabel({ ruleId: item.rule_id, labelerId, predictions });
          onLocalLabel(item.rule_id, "skip", null);
          onAdvance(1);
        } catch (err) { notify("error", `Skip failed: ${err.message ?? err}`); }
      }

      const codeBodyRef = useRef(null);
      useEffect(() => {
        const body = codeBodyRef.current;
        if (!body) return;
        const hl = body.querySelector(".code-section-line.highlight");
        if (!hl) return;
        const bodyRect = body.getBoundingClientRect();
        const hlRect = hl.getBoundingClientRect();
        const offsetWithinBody = hlRect.top - bodyRect.top + body.scrollTop;
        const target = offsetWithinBody - body.clientHeight / 2 + hl.clientHeight / 2;
        body.scrollTo({ top: Math.max(0, target), behavior: "smooth" });
      }, [item.rule_id, item.line_start]);

      return html`
        <section className="class-main">
          <div className="class-top">
            <div className="code-section">
              <div className="code-section-header">
                <span>${item.short_filename}</span>
              </div>
              <div className="code-section-body" ref=${codeBodyRef}>
                ${codeSnippet.map(l => html`
                  <div key=${l.line_number} className=${`code-section-line${l.highlight ? " highlight" : ""}`}>
                    <span className="ln">${l.line_number}</span>
                    <span className="lt">${l.text || " "}</span>
                  </div>
                `)}
              </div>
            </div>
          </div>

          ${item.prediction?.rationale && html`
            <div className="class-rationale">
              <span className="caption">JUDGE RATIONALE${item.prediction.confidence ? ` · confidence ${item.prediction.confidence.toFixed(2)}` : ""}</span>
              <p>${item.prediction.rationale}</p>
            </div>
          `}

          <div className="class-axes-scroll">
            <div className="axis-grid">
              ${AXES.map(axis => {
                const isOpen = !!expanded[axis.key];
                const summary = (() => {
                  if (axis.key === "AMBIGUITY") return draft.AMBIGUITY_LEVEL || "—";
                  return summarizePrediction(item.prediction, axis.llmKey);
                })();
                return html`
                  <div key=${axis.key} className="axis-field">
                    <button className="axis-header"
                      onClick=${() => setExpanded(prev => ({ ...prev, [axis.key]: !prev[axis.key] }))}>
                      <span className="axis-header-left">
                        <span className="axis-label">${axis.key}</span>
                        <span className="axis-summary-value">${summary}</span>
                      </span>
                      ${isOpen ? html`<${ChevronDown} size=${14} />` : html`<${ChevronRight} size=${14} />`}
                    </button>
                    ${isOpen && html`
                      <div className="axis-body">
                        <div className="axis-llm-box">
                          <span className="head">LLM Judge</span>
                          <span className="body">
                            ${axis.isList
                              ? (item.prediction?.[axis.llmKey] ?? []).join(", ") || axis.prompt
                              : (item.prediction?.[axis.llmKey] || axis.prompt)}
                          </span>
                        </div>
                        ${axis.key === "AMBIGUITY" && html`
                          <div className="axis-notes-box">
                            <span className="head">Ambiguity level</span>
                            <select value=${draft.AMBIGUITY_LEVEL}
                              onChange=${e => patchAmbiguityLevel(e.target.value)}>
                              <option value="none">none</option>
                              <option value="low">low</option>
                              <option value="medium">medium</option>
                              <option value="high">high</option>
                            </select>
                          </div>
                        `}
                        <div className="axis-notes-box">
                          <span className="head">Your notes${axis.isList ? " (one per line)" : ""}</span>
                          <textarea value=${draft[axis.key]}
                            placeholder=${`Add your ${axis.key.toLowerCase()} notes...`}
                            onChange=${e => patchAxis(axis.key, e.target.value)} />
                        </div>
                      </div>
                    `}
                  </div>
                `;
              })}
            </div>
          </div>
          <div className="action-bar">
            <button className="skip-btn" onClick=${skip}>Skip</button>
            <button className=${`save-btn ${saveState}`}
              disabled=${saveState === "saving"}
              onClick=${saveClassification}>
              ${saveState === "saving" ? "Saving…"
                : saveState === "success" ? "Saved ✓"
                : saveState === "error"   ? "Save failed ✕"
                : "Save Classification"}
            </button>
          </div>
        </section>
      `;
    }

    // =================================================================
    // App
    // =================================================================
    function App() {
      const [page, setPage] = useState("extraction");
      const [bootError, setBootError] = useState("");
      const [bootReady, setBootReady] = useState(false);

      useEffect(() => {
        let cancelled = false;
        getConnection().then(
          () => { if (!cancelled) setBootReady(true); },
          (err) => { if (!cancelled) setBootError(err.message || String(err)); }
        );
        return () => { cancelled = true; };
      }, []);

      if (bootError) {
        return html`
          <div className="boot-splash">
            <div className="banner error" style=${{ maxWidth: "32rem" }}>
              <b>Failed to connect to MotherDuck.</b><br/>${bootError}
            </div>
          </div>
        `;
      }
      if (!bootReady) {
        return html`
          <div className="boot-splash">
            <div className="spinner"></div>
            <div style=${{ color: "var(--fg-secondary)" }}>Loading WASM and connecting to MotherDuck…</div>
            <div style=${{ fontSize: "12px", color: "var(--fg-tertiary)" }}>First load may take a few seconds.</div>
          </div>
        `;
      }

      return html`
        <${IdentityProvider}>
          <div className="app-shell">
            <header className="topbar">
              <div>
                <h1>${page === "extraction" ? "Extraction" : "Classification"}</h1>
                <p>${
                  page === "extraction"
                    ? "Extract and review rules from markdown source files."
                    : "Review extracted rules and classification fields against source text."
                }</p>
              </div>
              <div className="top-right">
                <${LabelerPicker} />
                <button className="icon-btn" title="Refresh"
                  onClick=${() => window.location.reload()}>
                  <${RefreshIcon} size=${14} />
                </button>
                <div className="tabs">
                  <button className=${`tab-btn${page === "extraction" ? " active" : ""}`}
                    onClick=${() => setPage("extraction")}>Extraction</button>
                  <button className=${`tab-btn${page === "classification" ? " active" : ""}`}
                    onClick=${() => setPage("classification")}>Classification</button>
                </div>
              </div>
            </header>
            ${page === "extraction" ? html`<${ExtractionPage} />` : html`<${ClassificationPage} />`}
          </div>
        <//>
      `;
    }

    createRoot(document.getElementById("root")).render(html`<${App} />`);
  </script>
</body>
</html>
