</head>
<body>
  <div id="root">
    <div class="boot-splash">
      <div class="spinner"></div>
      <div>Loading labeling app…</div>
    </div>
  </div>

  <!-- Optional config.js (Vercel build artifact). Silent 404 locally. -->
  <script src="./config.js"></script>

  <script type="module">
    import React, {
      useState, useEffect, useMemo, useCallback, useContext,
      createContext, useRef
    } from "react";
    import { createRoot } from "react-dom/client";
    import htm from "htm";
    import { MDConnection } from "@motherduck/wasm-client";

    // Tell the boot watchdog (index <script>) that imports resolved and the
    // module is running — distinguishes a stalled CDN import from a slow connect.
    window.__moduleStarted = true;

    const html = htm.bind(React.createElement);

    // =================================================================
    // config — three-source loader
    // =================================================================
    const ENV_PATH = "./.env";
    const LS_TOKEN_KEY = "labeling.motherduckToken";
    const LS_DB_KEY = "labeling.motherduckDatabase";

    function parseEnv(text) {
      const out = {};
      for (const raw of text.split(/\r?\n/)) {
        const line = raw.trim();
        if (!line || line.startsWith("#")) continue;
        const eq = line.indexOf("=");
        if (eq < 0) continue;
        const key = line.slice(0, eq).trim();
        let value = line.slice(eq + 1).trim();
        if (value.startsWith('"') && value.endsWith('"')) value = value.slice(1, -1);
        else if (value.startsWith("'") && value.endsWith("'")) value = value.slice(1, -1);
        out[key] = value;
      }
      return out;
    }
    async function loadConfig() {
      if (window.__LABELING_CONFIG?.MOTHERDUCK_TOKEN) {
        return {
          MOTHERDUCK_TOKEN: window.__LABELING_CONFIG.MOTHERDUCK_TOKEN,
          MOTHERDUCK_DATABASE: window.__LABELING_CONFIG.MOTHERDUCK_DATABASE || "rules_in_the_wild",
        };
      }
      try {
        const resp = await fetch(ENV_PATH, { cache: "no-store" });
        if (resp.ok) {
          const env = parseEnv(await resp.text());
          if (env.MOTHERDUCK_TOKEN) {
            return {
              MOTHERDUCK_TOKEN: env.MOTHERDUCK_TOKEN,
              MOTHERDUCK_DATABASE: env.MOTHERDUCK_DATABASE || "rules_in_the_wild",
            };
          }
        }
      } catch {}
      const lsToken = localStorage.getItem(LS_TOKEN_KEY);
      if (lsToken) {
        return {
          MOTHERDUCK_TOKEN: lsToken,
          MOTHERDUCK_DATABASE: localStorage.getItem(LS_DB_KEY) || "rules_in_the_wild",
        };
      }
      return null;
    }

    // =================================================================
    // hashing helpers
    // =================================================================
    async function sha256Hex(s) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
    }
    function stableStringify(value) {
      if (value === null || typeof value !== "object") return JSON.stringify(value);
      if (Array.isArray(value)) return "[" + value.map(stableStringify).join(",") + "]";
      const keys = Object.keys(value).sort();
      return "{" + keys.map(k => JSON.stringify(k) + ":" + stableStringify(value[k])).join(",") + "}";
    }
    function parseJsonField(value) {
      if (value === null || value === undefined) return null;
      if (typeof value === "string") { try { return JSON.parse(value); } catch { return null; } }
      if (Array.isArray(value)) return value.map(String);
      // Arrow ListVector (from DuckDB-WASM VARCHAR[] columns).
      if (typeof value.toJson === "function") {
        const arr = value.toJson();
        return Array.isArray(arr) ? arr.map(String) : null;
      }
      if (typeof value.toArray === "function") return Array.from(value.toArray()).map(String);
      return null;
    }
    function asListOr(value, fallback) {
      const p = parseJsonField(value);
      return p === null ? fallback : p;
    }

    // =================================================================
    // duckdb/schema — v0.4 DDL
    // =================================================================
    const LABELER_DDL = `
      CREATE TABLE IF NOT EXISTS labeler (
        id           VARCHAR PRIMARY KEY,
        handle       VARCHAR NOT NULL UNIQUE,
        display_name VARCHAR,
        created_at   TIMESTAMP NOT NULL DEFAULT current_timestamp
      )
    `;
    const RULE_EXTRACTION_LABEL_DDL = `
      CREATE TABLE IF NOT EXISTS rule_extraction_label (
        rule_id    VARCHAR NOT NULL,
        labeler_id VARCHAR NOT NULL,
        decision   VARCHAR NOT NULL,
        created_at TIMESTAMP NOT NULL DEFAULT current_timestamp,
        updated_at TIMESTAMP NOT NULL DEFAULT current_timestamp,
        PRIMARY KEY (rule_id, labeler_id)
      )
    `;
    const RULE_CLASSIFICATION_LABEL_DDL = `
      CREATE TABLE IF NOT EXISTS rule_classification_label (
        rule_id                          VARCHAR NOT NULL,
        labeler_id                       VARCHAR NOT NULL,
        predicted_decision_id            VARCHAR,
        predicted_snapshot_hash          VARCHAR,
        decision                         VARCHAR NOT NULL DEFAULT 'skip',
        predicted_prerequisites          JSON,
        predicted_enforcement_mechanisms JSON,
        predicted_triggers               JSON,
        predicted_ambiguity_level        VARCHAR,
        predicted_ambiguity_notes        VARCHAR,
        corrected_prerequisites          JSON,
        corrected_enforcement_mechanisms JSON,
        corrected_triggers               JSON,
        corrected_ambiguity_level        VARCHAR,
        corrected_ambiguity_notes        VARCHAR,
        created_at                       TIMESTAMP NOT NULL DEFAULT current_timestamp,
        updated_at                       TIMESTAMP NOT NULL DEFAULT current_timestamp,
        PRIMARY KEY (rule_id, labeler_id)
      )
    `;
    // Human annotations (see schema doc §8). App-managed, so — like the label
    // tables — these use VARCHAR ids and carry NO foreign keys and NO UNIQUE on
    // mutable columns: an FK or UNIQUE *violation* HANGS the single DuckDB-WASM
    // connection forever instead of erroring, and a BLOB index would hang on
    // UPDATE. rule_id / block_id / labeler_id are the VARCHAR forms the reads
    // already cast UUIDs to. Own-id PK = an append thread (many per entity).
    // rule_id is the rule UUID at comment time, but the crawler re-extracts
    // rules with fresh UUIDs, so a comment keyed only on rule_id is orphaned on
    // the next crawl. We also persist a STABLE anchor — (rules_file_id, the
    // rule's source line span) — so comments re-link to the re-extracted rule
    // by source location, exactly how source_block comments survive via their
    // original line span. Reads key off this span, not the ephemeral UUID.
    const RULE_COMMENT_DDL = `
      CREATE TABLE IF NOT EXISTS rule_comment (
        id            VARCHAR PRIMARY KEY,
        rule_id       VARCHAR NOT NULL,
        rules_file_id VARCHAR,
        line_start    INTEGER,
        line_end      INTEGER,
        labeler_id    VARCHAR NOT NULL,
        body          VARCHAR NOT NULL,
        created_at    TIMESTAMP NOT NULL DEFAULT current_timestamp,
        updated_at    TIMESTAMP NOT NULL DEFAULT current_timestamp
      )
    `;
    // line_start / line_end are editable; original_line_* are the natural key we
    // find-or-create on (no UNIQUE constraint — a dup would hang; the JS path
    // pre-checks instead). Neither editable column is indexed (indexed-column
    // UPDATE hangs), so range edits are safe.
    const SOURCE_BLOCK_DDL = `
      CREATE TABLE IF NOT EXISTS source_block (
        id                  VARCHAR PRIMARY KEY,
        rules_file_id       VARCHAR NOT NULL,
        kind                VARCHAR,
        line_start          INTEGER NOT NULL,
        line_end            INTEGER NOT NULL,
        original_line_start INTEGER NOT NULL,
        original_line_end   INTEGER NOT NULL,
        snippet             VARCHAR,
        created_at          TIMESTAMP NOT NULL DEFAULT current_timestamp,
        last_edited_at      TIMESTAMP
      )
    `;
    const SOURCE_BLOCK_COMMENT_DDL = `
      CREATE TABLE IF NOT EXISTS source_block_comment (
        id         VARCHAR PRIMARY KEY,
        block_id   VARCHAR NOT NULL,
        labeler_id VARCHAR NOT NULL,
        body       VARCHAR NOT NULL,
        created_at TIMESTAMP NOT NULL DEFAULT current_timestamp,
        updated_at TIMESTAMP NOT NULL DEFAULT current_timestamp
      )
    `;
    // original_rule_text / original_line_* live directly on the pipeline's
    // `rule` table (the crawler populates them), and rule edits preserve them
    // via COALESCE — so no snapshot side-table or per-poll backfill is needed.

    // =================================================================
    // duckdb/client
    // =================================================================
    let _appConfig = null;
    let _connPromise = null;
    let _schemaProvisioned = false;   // boot DDL runs once per page load, not on every reconnect
    let _opChain = Promise.resolve(); // serializes DB ops onto the single shared connection
    const DB_OP_TIMEOUT_MS = 15000;   // a query exceeding this is treated as wedged/contended
    const _delay = (ms) => new Promise((r) => setTimeout(r, ms));
    // Reject (instead of hanging forever) if a step stalls — e.g. the MotherDuck
    // instance is waking from idle, a worker/network call wedged, or the database
    // is contended because several labelers and the crawler are all writing.
    function withTimeout(promise, ms, label) {
      let timer;
      return Promise.race([
        promise,
        new Promise((_, reject) => {
          timer = setTimeout(
            () => reject(new Error(`${label} timed out after ${Math.round(ms / 1000)}s (database busy — please retry).`)),
            ms
          );
        }),
      ]).finally(() => clearTimeout(timer));
    }
    function getConnection() {
      if (_connPromise) return _connPromise;
      _connPromise = (async () => {
        if (!_appConfig) _appConfig = await loadConfig();
        if (!_appConfig?.MOTHERDUCK_TOKEN) {
          throw new Error(
            "MotherDuck token not set. Copy .env.example to .env next to this HTML, " +
            "paste your token (https://app.motherduck.com/settings/tokens), and reload."
          );
        }
        const conn = MDConnection.create({ mdToken: _appConfig.MOTHERDUCK_TOKEN });
        await withTimeout(conn.isInitialized(), 30000, "MotherDuck init");
        await withTimeout(conn.evaluateQuery(`USE ${_appConfig.MOTHERDUCK_DATABASE}`), 30000, "MotherDuck connect");
        // Schema setup is idempotent (CREATE/ALTER ... IF NOT EXISTS) and only
        // needs to run once per page load. Skipping it on auto-reconnect keeps
        // recovery from a wedged connection fast (just create + USE).
        if (!_schemaProvisioned) {
          for (const ddl of [
            LABELER_DDL,
            RULE_EXTRACTION_LABEL_DDL,
            RULE_CLASSIFICATION_LABEL_DDL,
            RULE_COMMENT_DDL,
            SOURCE_BLOCK_DDL,
            SOURCE_BLOCK_COMMENT_DDL,
          ]) {
            await withTimeout(conn.evaluateQuery(ddl), 30000, "MotherDuck schema setup");
          }
          // Additive migrations against prod-only pipeline tables. Each is wrapped
          // in try/catch because a fresh *local* DuckDB has no rules_file/rule
          // table (the pipeline tables live only in the prod MotherDuck DB) — a
          // missing table here must not wedge boot.
          //   • rules_file.missed_rules — the "Add Rule" flow appends a note here.
          //   • rule.extraction_reason  — the re-extraction crawler emits a short
          //     reason per rule; the extraction page reads it (read-only in-app).
          //   • rule.rule_type / rule.execution_guidance — extract-v2 fields. In
          //     prod they already exist (rule_type is an ENUM; ADD ... IF NOT EXISTS
          //     no-ops there). The TEXT fallback only materializes on a hypothetical
          //     older DB, where TEXT holding 'rule'/'context' reads back fine.
          for (const [sql, label] of [
            [`ALTER TABLE rules_file ADD COLUMN IF NOT EXISTS missed_rules TEXT`, "missed_rules migration"],
            [`ALTER TABLE rule ADD COLUMN IF NOT EXISTS extraction_reason TEXT`, "extraction_reason migration"],
            [`ALTER TABLE rule ADD COLUMN IF NOT EXISTS rule_type TEXT DEFAULT 'rule'`, "rule_type migration"],
            [`ALTER TABLE rule ADD COLUMN IF NOT EXISTS execution_guidance TEXT`, "execution_guidance migration"],
            // rule_comment stable anchor (re-link comments across re-extraction).
            [`ALTER TABLE rule_comment ADD COLUMN IF NOT EXISTS rules_file_id VARCHAR`, "rule_comment.rules_file_id migration"],
            [`ALTER TABLE rule_comment ADD COLUMN IF NOT EXISTS line_start INTEGER`, "rule_comment.line_start migration"],
            [`ALTER TABLE rule_comment ADD COLUMN IF NOT EXISTS line_end INTEGER`, "rule_comment.line_end migration"],
          ]) {
            try {
              await withTimeout(conn.evaluateQuery(sql), 30000, `MotherDuck ${label}`);
            } catch (_) { /* table absent locally — skip */ }
          }
          _schemaProvisioned = true;
        }
        return conn;
      })().catch(err => { _connPromise = null; throw err; });
      return _connPromise;
    }
    // Drop the (possibly wedged) connection so the next getConnection() builds a
    // fresh one. Schema stays provisioned, so the reconnect is just create + USE.
    function resetConnection() { _connPromise = null; }

    // Every DB call funnels through here. Three properties make the app survive
    // ~5 concurrent labelers plus a background crawler hammering the same DB:
    //   1. Serialized — ops run one-at-a-time on the single WASM connection, so
    //      concurrent React handlers can't interleave queries and wedge the
    //      worker (the old failure mode where one stuck write froze everything).
    //   2. Timed out — a contended or hung query (incl. the DuckDB-WASM "silent
    //      hang" family: indexed-column UPDATE, constraint violation) rejects
    //      after DB_OP_TIMEOUT_MS instead of blocking forever.
    //   3. Self-healing — on any failure the connection is reset, so the very
    //      next action reconnects and works; the app never gets permanently
    //      stuck. Callers still see the rejection and can toast/retry.
    // `retries` extra attempts after the first, each on a fresh connection with a
    // short backoff — lets a transiently-contended op (another labeler or the
    // crawler briefly holding the single DB writer lock) self-heal. Callers pass
    // retries=0 for non-idempotent writes (INSERT) so a timed-out-but-committed
    // write is never duplicated; idempotent ops (SELECT/UPDATE/DELETE) retry.
    function runDbOp(fn, label, retries = 0) {
      const attempt = async (n) => {
        let conn;
        try {
          conn = await getConnection();
        } catch (err) {
          resetConnection();
          if (n < retries) { await _delay(600 * (n + 1)); return attempt(n + 1); }
          throw err;
        }
        try {
          return await withTimeout(Promise.resolve().then(() => fn(conn)), DB_OP_TIMEOUT_MS, label);
        } catch (err) {
          resetConnection();
          if (n < retries) { await _delay(600 * (n + 1)); return attempt(n + 1); }
          throw err;
        }
      };
      const op = _opChain.then(() => attempt(0));
      // Keep the serialization chain alive regardless of this op's outcome.
      _opChain = op.then(() => undefined, () => undefined);
      return op;
    }

    async function evalQuery(sql) {
      // evalQuery is read-only (SELECT) — safe to retry.
      return runDbOp(async (conn) => {
        const r = await conn.evaluateQuery(sql);
        return r.data ? r.data.toRows() : [];
      }, "query", 1);
    }
    async function evalPrepared(sql, params) {
      // INSERTs are not idempotent (a committed-but-timed-out insert must not be
      // retried into a duplicate); SELECT/UPDATE/DELETE are safe to retry once.
      const retries = /^\s*insert/i.test(sql) ? 0 : 1;
      return runDbOp(async (conn) => {
        const r = await conn.evaluatePreparedStatement(sql, params);
        return r.data ? r.data.toRows() : [];
      }, "prepared statement", retries);
    }

    // =================================================================
    // duckdb/queries
    // =================================================================
    // Deep-link to the file on the repo's default branch (HEAD). We deliberately
    // do NOT pin to the crawl's commit_sha: a stored sha/path pair 404s once the
    // file is renamed or moved, and a reviewer wants the current file anyway.
    // githubRepoUrl() below is the always-resolves fallback (the repo landing
    // page) surfaced alongside it, for the case where even HEAD/<path> 404s.
    function githubBlobUrl(canonical, path) {
      if (!canonical || !path) return null;
      const base = canonical.replace(/\/+$/, "");
      return `${base}/blob/HEAD/${path.replace(/^\/+/, "")}`;
    }
    function githubRepoUrl(canonical) {
      if (!canonical) return null;
      return canonical.replace(/\/+$/, "");
    }
    function githubRepoLabel(canonical, path) {
      if (!canonical) return path || "";
      const tail = canonical.replace(/^https?:\/\//, "").replace(/\.git$/, "");
      return path ? `${tail} / ${path}` : tail;
    }

    async function listLabelers() {
      // labeler.id is UUID in prod. DuckDB-WASM returns UUID as
      // { bytes: { 0..15 } } which doesn't round-trip back as a param —
      // cast to VARCHAR on read. Same on every other UUID column.
      const rows = await evalQuery(`SELECT id::VARCHAR AS id, handle, display_name FROM labeler ORDER BY handle`);
      return rows.map(r => ({ id: r.id, handle: r.handle, display_name: r.display_name ?? null }));
    }

    async function listDocuments() {
      const rows = await evalQuery(`
        SELECT
          f.id::VARCHAR                                              AS document_id,
          f.path                                                     AS source_path,
          COALESCE(p.name || '/' || f.path, f.path)                  AS document_name,
          p.canonical_url                                            AS canonical_url,
          f.raw_content                                              AS document_text,
          (SELECT COUNT(*)::INTEGER FROM rule r
            WHERE r.rules_file_id = f.id) AS rule_count
        FROM rules_file f
        LEFT JOIN source_project p ON p.id = f.project_id
        ORDER BY document_name, source_path
      `);
      return rows.map(r => ({
        document_id: r.document_id,
        source_path: r.source_path,
        document_name: r.document_name,
        github_url: githubBlobUrl(r.canonical_url, r.source_path),
        repo_url: githubRepoUrl(r.canonical_url),
        breadcrumb: githubRepoLabel(r.canonical_url, r.source_path),
        document_text: r.document_text ?? "",
        rule_count: Number(r.rule_count ?? 0),
      }));
    }

    function sourceLinesFromText(documentText) {
      if (!documentText) return [];
      const lines = documentText.replace(/\r/g, "").split("\n");
      return lines.map((text, i) => ({ line_number: i + 1, text }));
    }

    // Segment a document into source-unit blocks and bucket each rule into the
    // block that contains its line_start. A *source unit* is the contiguous
    // source block a rule was extracted from — derived client-side, never
    // stored. Grouping the extraction queue by unit lets a reviewer see every
    // rule a paragraph produced side by side and spot blocks that produced no
    // rule at all (a candidate "missed" rule). Returns units in document order,
    // each { key, lineStart, lineEnd, snippet, rules: [] } (rules array may be
    // empty — those are the "empty units").
    function deriveSourceUnits(documentText, rules) {
      const lines = (documentText || "").replace(/\r/g, "").split("\n");
      const blocks = [];
      let para = null;            // accumulating paragraph block (1-based span)
      let inFence = false;        // inside a ``` / ~~~ fenced code block
      let fenceStart = null;
      const flushPara = () => { if (para) { blocks.push(para); para = null; } };
      for (let i = 0; i < lines.length; i++) {
        const ln = i + 1;
        const trimmed = lines[i].trim();
        const isFence = /^(```|~~~)/.test(trimmed);
        if (inFence) {
          // A fenced block (open..close) is ONE block, regardless of blanks.
          if (isFence) { blocks.push({ lineStart: fenceStart, lineEnd: ln }); inFence = false; fenceStart = null; }
          continue;
        }
        if (isFence) { flushPara(); inFence = true; fenceStart = ln; continue; }
        if (trimmed === "") { flushPara(); continue; }              // blank ends a paragraph
        if (/^#{1,6}\s/.test(trimmed)) { flushPara(); blocks.push({ lineStart: ln, lineEnd: ln }); continue; } // heading = own block
        if (/^([-*+]\s|\d+[.)]\s)/.test(trimmed)) { flushPara(); para = { lineStart: ln, lineEnd: ln }; continue; } // each list item starts a block
        if (para) para.lineEnd = ln; else para = { lineStart: ln, lineEnd: ln }; // ordinary / continuation line extends it
      }
      flushPara();
      if (inFence && fenceStart != null) blocks.push({ lineStart: fenceStart, lineEnd: lines.length }); // unclosed fence

      const snippetFor = (b) => {
        let fallback = null;
        for (let n = b.lineStart; n <= b.lineEnd; n++) {
          const t = (lines[n - 1] ?? "").trim();
          if (!t) continue;
          if (fallback === null) fallback = t;        // first non-blank (e.g. a fence marker)
          if (!/^(```|~~~)/.test(t)) { fallback = t; break; } // prefer first content line
        }
        if (fallback === null) return "(blank)";
        return fallback.length > 90 ? fallback.slice(0, 90) + "…" : fallback;
      };
      const units = blocks.map(b => ({
        key: `u:${b.lineStart}-${b.lineEnd}`,
        lineStart: b.lineStart,
        lineEnd: b.lineEnd,
        snippet: snippetFor(b),
        rules: [],
      }));
      // Bucket each rule by line_start containment; fall back to the nearest
      // preceding block (then the first block) when line_start lands in a gap
      // — a rule span crossing a boundary is assigned by its line_start.
      const assign = (ln) => {
        let containing = null, preceding = null;
        for (const u of units) {
          if (ln >= u.lineStart && ln <= u.lineEnd) { containing = u; break; }
          if (u.lineStart <= ln) preceding = u;
        }
        return containing || preceding || units[0] || null;
      };
      for (const r of rules) {
        let u = assign(r.line_start);
        if (!u) {
          // No document text (units empty) but rules exist — synthesize a unit.
          const key = `u:${r.line_start}-${r.line_end}`;
          u = units.find(x => x.key === key);
          if (!u) { u = { key, lineStart: r.line_start, lineEnd: r.line_end, snippet: (r.rule_text || "").slice(0, 90) || "(rule)", rules: [] }; units.push(u); }
        }
        u.rules.push(r);
      }
      units.sort((a, b) => a.lineStart - b.lineStart || a.lineEnd - b.lineEnd);
      return units;
    }

    async function getRulesForDocument(documentId, labelerId) {
      // Show EVERY rule extracted from the file (the extraction page reviews
      // the extraction itself — judged or not). The badge in the file list
      // counts the same set. original_* lives directly on the `rule` row
      // (the crawler populates it); COALESCE to the live values for the rare
      // rule that predates the column. my_extraction_decision is THIS labeler's
      // extraction-label decision (NULL when unlabeled) — drives the source-unit
      // "n/m labeled" rollup. Correlated scalar subquery, like the EXISTS checks
      // in getAllClassificationItems; binds '' for no-labeler (matches nothing,
      // so every rule reads as unlabeled — a SELECT comparison, never a hang).
      const rows = await evalPrepared(
        `
        SELECT
          r.id::VARCHAR             AS rule_id,
          r.rules_file_id::VARCHAR  AS rules_file_id,
          r.rule_text,
          r.line_start,
          r.line_end,
          COALESCE(r.original_rule_text, r.rule_text)   AS original_rule_text,
          COALESCE(r.original_line_start, r.line_start) AS original_line_start,
          COALESCE(r.original_line_end, r.line_end)     AS original_line_end,
          r.extraction_reason       AS extraction_reason,
          r.rule_type::VARCHAR      AS rule_type,
          r.execution_guidance      AS execution_guidance,
          (SELECT el.decision FROM rule_extraction_label el
             WHERE el.rule_id = r.id::VARCHAR AND el.labeler_id::VARCHAR = ?
             LIMIT 1)              AS my_extraction_decision
        FROM rule r
        WHERE r.rules_file_id::VARCHAR = ?
        ORDER BY r.line_start, r.line_end
        `,
        [labelerId ?? "", documentId]
      );
      return rows.map(r => ({
        rule_id: r.rule_id,
        rules_file_id: r.rules_file_id,
        rule_text: r.rule_text,
        line_start: Number(r.line_start),
        line_end: Number(r.line_end),
        original_rule_text: r.original_rule_text,
        original_line_start: Number(r.original_line_start),
        original_line_end: Number(r.original_line_end),
        extraction_reason: r.extraction_reason ?? null,
        rule_type: r.rule_type ?? "rule",
        execution_guidance: r.execution_guidance ?? null,
        my_extraction_decision: r.my_extraction_decision ?? null,
      }));
    }

    // --- Human annotations (comments) + source-block range overrides ---------
    // All three reads are best-effort: a failure (or a brand-new DB still
    // provisioning) returns an empty Map so the extraction panel still renders.
    // The live comment/source_block tables use UUID ids (created from the ideal
    // schema, not the app's VARCHAR CREATE-IF-NOT-EXISTS fallback), so every
    // id/key comparison casts BOTH sides to VARCHAR — binding a JS string to a
    // UUID-typed prepared-statement parameter throws "Invalid column type",
    // and `col::VARCHAR = ?` is the type-safe form whether the column is UUID or
    // VARCHAR. Same pattern the prod-table reads use everywhere else.

    function commentRowToObj(r) {
      return {
        id: r.id,
        labeler_id: r.labeler_id,
        author: r.display_name || r.handle || "unknown",
        body: r.body ?? "",
        created_at: (r.created_at ?? "").slice(0, 16),
      };
    }

    // Map("lineStart-lineEnd" -> [comment]) for every rule comment in a file,
    // oldest first. Keyed by the rule's SOURCE SPAN (stable across re-extraction)
    // rather than the rule UUID (reassigned each crawl). A comment matches if its
    // persisted file anchor matches the file, OR (for comments written before the
    // anchor existed) its rule still resolves to the file — COALESCE then prefers
    // the persisted span and falls back to the live rule's span. This is what
    // lets everyone keep seeing a rule's comments after the crawler re-extracts.
    async function getRuleCommentsForDocument(documentId) {
      try {
        const rows = await evalPrepared(
          `SELECT c.id::VARCHAR AS id, c.rule_id::VARCHAR AS rule_id, c.labeler_id::VARCHAR AS labeler_id,
                  c.body, c.created_at::VARCHAR AS created_at,
                  COALESCE(c.line_start, r.line_start) AS line_start,
                  COALESCE(c.line_end,   r.line_end)   AS line_end,
                  l.handle AS handle, l.display_name AS display_name
           FROM rule_comment c
           LEFT JOIN rule r ON r.id::VARCHAR = c.rule_id
           LEFT JOIN labeler l ON l.id::VARCHAR = c.labeler_id
           WHERE c.rules_file_id::VARCHAR = ? OR r.rules_file_id::VARCHAR = ?
           ORDER BY c.created_at`,
          [documentId, documentId]
        );
        const m = new Map();
        for (const row of rows) {
          if (row.line_start == null || row.line_end == null) continue;
          const key = `${Number(row.line_start)}-${Number(row.line_end)}`;
          if (!m.has(key)) m.set(key, []);
          m.get(key).push(commentRowToObj(row));
        }
        return m;
      } catch (_) { return new Map(); }
    }

    // Map(origKey -> { blockId, lineStart, lineEnd }) of persisted range edits,
    // keyed by the segmenter span ("u:start-end") so it lines up with the
    // browser-derived unit key. original_line_* is that stable identity.
    async function getSourceBlockOverridesForDocument(documentId) {
      try {
        const rows = await evalPrepared(
          `SELECT id::VARCHAR AS id, line_start, line_end, original_line_start, original_line_end
           FROM source_block WHERE rules_file_id::VARCHAR = ?`,
          [documentId]
        );
        const m = new Map();
        for (const r of rows) {
          m.set(`u:${Number(r.original_line_start)}-${Number(r.original_line_end)}`, {
            blockId: r.id,
            lineStart: Number(r.line_start),
            lineEnd: Number(r.line_end),
          });
        }
        return m;
      } catch (_) { return new Map(); }
    }

    // Map(origKey -> [comment]) for source-block comments in a file. Joined back
    // to the block's original span so it keys off the derived unit, same as the
    // overrides map.
    async function getSourceBlockCommentsForDocument(documentId) {
      try {
        const rows = await evalPrepared(
          `SELECT c.id::VARCHAR AS id, c.block_id::VARCHAR AS block_id, c.labeler_id::VARCHAR AS labeler_id,
                  c.body, c.created_at::VARCHAR AS created_at,
                  b.original_line_start AS original_line_start,
                  b.original_line_end   AS original_line_end,
                  l.handle AS handle, l.display_name AS display_name
           FROM source_block_comment c
           JOIN source_block b ON b.id::VARCHAR = c.block_id::VARCHAR
           LEFT JOIN labeler l ON l.id::VARCHAR = c.labeler_id
           WHERE b.rules_file_id::VARCHAR = ?
           ORDER BY c.created_at`,
          [documentId]
        );
        const m = new Map();
        for (const r of rows) {
          const key = `u:${Number(r.original_line_start)}-${Number(r.original_line_end)}`;
          if (!m.has(key)) m.set(key, []);
          m.get(key).push(commentRowToObj(r));
        }
        return m;
      } catch (_) { return new Map(); }
    }

    // Lighter than listDocuments(): no per-file COUNT(*) subquery (256 of
    // those over the 12k-row `rule` table is what made the classification
    // load take ~10s and queue writes behind it). Classification doesn't show
    // rule counts, so we skip them. raw_content is fetched once per file here
    // and mapped onto rules — never joined per-rule.
    async function listDocumentsForClassification() {
      const rows = await evalQuery(`
        SELECT
          f.id::VARCHAR                                              AS document_id,
          f.path                                                     AS source_path,
          COALESCE(p.name || '/' || f.path, f.path)                  AS document_name,
          p.canonical_url                                            AS canonical_url,
          f.raw_content                                              AS document_text
        FROM rules_file f
        LEFT JOIN source_project p ON p.id = f.project_id
      `);
      return rows.map(r => ({
        document_id: r.document_id,
        source_path: r.source_path,
        document_name: r.document_name,
        github_url: githubBlobUrl(r.canonical_url, r.source_path),
        repo_url: githubRepoUrl(r.canonical_url),
        document_text: r.document_text ?? "",
      }));
    }

    async function getAllClassificationItems() {
      const [docs, predictions] = await Promise.all([
        listDocumentsForClassification(),
        getClassificationPredictions(),
      ]);
      const docById = new Map(docs.map(d => [d.document_id, d]));
      const rows = await evalQuery(`
        SELECT
          r.id::VARCHAR             AS rule_id,
          r.rules_file_id::VARCHAR  AS rules_file_id,
          r.rule_text,
          r.line_start,
          r.line_end
        FROM rule r
        WHERE EXISTS (SELECT 1 FROM rule_llm_decision d WHERE d.rule_id = r.id AND d.parse_ok = TRUE)
           OR EXISTS (SELECT 1 FROM rule_extraction_label l WHERE l.rule_id = r.id::VARCHAR AND l.decision = 'accept')
        ORDER BY r.rules_file_id, r.line_start, r.line_end
      `);
      const ids = rows.map(r => r.rule_id);
      const labelsByRule = await getClassificationLabelsByRules(ids);
      return rows.map(r => {
        const doc = docById.get(r.rules_file_id);
        return {
          rule_id: r.rule_id,
          rules_file_id: r.rules_file_id,
          document_id: doc?.document_id,
          source_path: doc?.source_path ?? "",
          document_name: doc?.document_name ?? "",
          short_filename: doc?.document_name ?? doc?.source_path ?? "",
          github_url: doc?.github_url ?? null,
          repo_url: doc?.repo_url ?? null,
          rule_text: r.rule_text,
          line_start: Number(r.line_start),
          line_end: Number(r.line_end),
          document_text: doc?.document_text ?? "",
          prediction: predictions.get(r.rule_id) ?? null,
          labels: labelsByRule.get(r.rule_id) ?? [],
        };
      });
    }

    async function getClassificationPredictions() {
      // Prod rule_llm_decision is v0.4 shape — prerequisites / enforcement_mechanisms /
      // triggers are VARCHAR[], ambiguity_level is an ENUM, ambiguity_notes is text.
      // Read them directly, no lossy adapter needed.
      const rows = await evalQuery(`
        WITH ranked AS (
          SELECT d.*, ROW_NUMBER() OVER (PARTITION BY d.rule_id ORDER BY d.created_at DESC) AS rn
          FROM rule_llm_decision d
          WHERE d.parse_ok = TRUE
        )
        SELECT
          ranked.id::VARCHAR                   AS decision_id,
          ranked.rule_id::VARCHAR              AS rule_id,
          ranked.prerequisites                 AS prerequisites,
          ranked.enforcement_mechanisms        AS enforcement_mechanisms,
          ranked.triggers                      AS triggers,
          ranked.ambiguity_level::VARCHAR      AS ambiguity_level,
          COALESCE(ranked.ambiguity_notes, '') AS ambiguity_notes,
          COALESCE(ranked.confidence, 0.0)     AS confidence,
          COALESCE(ranked.rationale, '')       AS rationale
        FROM ranked
        WHERE ranked.rn = 1
      `);
      // DuckDB-WASM returns VARCHAR[] as an Apache Arrow ListVector, not a
      // native JS array. It exposes .toJson() which gives back a plain array;
      // Array.isArray() on the vector returns false, so the legacy check
      // silently dropped every list. Match every shape we might encounter.
      const toList = (v) => {
        if (v == null) return [];
        if (Array.isArray(v)) return v.map(String);
        if (typeof v.toJson === "function") {
          const arr = v.toJson();
          return Array.isArray(arr) ? arr.map(String) : [];
        }
        if (typeof v.toArray === "function") return Array.from(v.toArray()).map(String);
        return [];
      };
      const out = new Map();
      for (const r of rows) {
        out.set(r.rule_id, {
          decision_id: r.decision_id,
          prerequisites: toList(r.prerequisites),
          enforcement_mechanisms: toList(r.enforcement_mechanisms),
          triggers: toList(r.triggers),
          ambiguity_level: r.ambiguity_level || "",
          ambiguity_notes: r.ambiguity_notes || "",
          confidence: Number(r.confidence ?? 0),
          rationale: r.rationale || "",
        });
      }
      return out;
    }

    async function getClassificationLabelsByRules(ruleIds) {
      const out = new Map();
      if (ruleIds.length === 0) return out;
      const placeholders = ruleIds.map(() => "?").join(", ");
      const rows = await evalPrepared(
        `
        SELECT
          l.rule_id::VARCHAR    AS rule_id,
          l.labeler_id::VARCHAR AS labeler_id,
          le.handle,
          l.decision::VARCHAR   AS decision,
          l.predicted_decision_id::VARCHAR AS predicted_decision_id,
          l.predicted_prerequisites,
          l.predicted_enforcement_mechanisms,
          l.predicted_triggers,
          l.predicted_ambiguity_level::VARCHAR AS predicted_ambiguity_level,
          l.predicted_ambiguity_notes,
          l.corrected_prerequisites,
          l.corrected_enforcement_mechanisms,
          l.corrected_triggers,
          l.corrected_ambiguity_level::VARCHAR AS corrected_ambiguity_level,
          l.corrected_ambiguity_notes,
          l.created_at, l.updated_at
        FROM rule_classification_label l
        JOIN labeler le ON le.id = l.labeler_id
        WHERE l.rule_id::VARCHAR IN (${placeholders})
        ORDER BY l.updated_at DESC
        `,
        ruleIds
      );
      for (const r of rows) {
        const list = out.get(r.rule_id) ?? [];
        list.push({
          rule_id: r.rule_id,
          labeler_id: r.labeler_id,
          labeler_handle: r.handle,
          decision: r.decision,
          predicted_decision_id: r.predicted_decision_id,
          predicted_prerequisites: asListOr(r.predicted_prerequisites, []),
          predicted_enforcement_mechanisms: asListOr(r.predicted_enforcement_mechanisms, []),
          predicted_triggers: asListOr(r.predicted_triggers, []),
          predicted_ambiguity_level: r.predicted_ambiguity_level,
          predicted_ambiguity_notes: r.predicted_ambiguity_notes ?? "",
          corrected_prerequisites: parseJsonField(r.corrected_prerequisites),
          corrected_enforcement_mechanisms: parseJsonField(r.corrected_enforcement_mechanisms),
          corrected_triggers: parseJsonField(r.corrected_triggers),
          corrected_ambiguity_level: r.corrected_ambiguity_level,
          corrected_ambiguity_notes: r.corrected_ambiguity_notes,
          created_at: r.created_at,
          updated_at: r.updated_at,
        });
        out.set(r.rule_id, list);
      }
      return out;
    }

    // =================================================================
    // duckdb/upserts
    // =================================================================
    async function upsertLabeler(handle, displayName = null) {
      const existing = (await evalPrepared(
        `SELECT id::VARCHAR AS id, handle, display_name FROM labeler WHERE handle = ?`, [handle]
      ))[0];
      if (existing) return { id: existing.id, handle: existing.handle, display_name: existing.display_name };
      const id = crypto.randomUUID();
      await evalPrepared(
        `INSERT INTO labeler (id, handle, display_name) VALUES (?::UUID, ?, ?)`,
        [id, handle, displayName]
      );
      return { id, handle, display_name: displayName };
    }

    async function updateRule({ ruleId, ruleText }) {
      // Labeler text correction: overwrite the live rule_text (+ its normalized
      // form) and stamp last_edited_at. Any labeler may overwrite; last write
      // wins (no provenance). The line range stays as the extractor set it, and
      // original_* is frozen at insert, so both are left untouched.
      //
      // rule_text_sha256 is deliberately NOT updated: it is the only INDEXED
      // column on `rule` (rule_sha_idx), and updating an indexed BLOB column
      // HANGS the DuckDB-WASM connection forever instead of erroring — the same
      // hang family as a constraint violation. Confirmed empirically: an UPDATE
      // that sets rule_text_sha256 wedges the connection and never commits,
      // while the identical UPDATE without it commits fine. The stored hash
      // keeps describing the original extraction (original_rule_text is frozen
      // and preserved), which is what the dedup index is keyed on anyway.
      // last_edited_by_labeler_id is intentionally NOT set: the live `rule`
      // table lacks it (schema doc is ahead of prod), same as created_by_labeler_id
      // in addRule.
      await evalPrepared(
        `UPDATE rule
         SET rule_text = ?,
             rule_text_norm = lower(regexp_replace(?, '\\s+', ' ', 'g')),
             last_edited_at = now()
         WHERE id::VARCHAR = ?`,
        [ruleText, ruleText.trim(), ruleId]
      );
    }

    async function addRule({ rulesFileId, ruleText, lineStart, lineEnd, labelerId }) {
      // Multiple rules MAY share one line range — the extraction guide (§3.2,
      // §6.2) splits a compound single line into several rules on the same line,
      // and a labeler can add another rule to a line that already carries one.
      // The schema's index on (rules_file_id, original_line_start,
      // original_line_end) is NON-UNIQUE for exactly this reason, so a duplicate
      // span is legal: no constraint to trip, no pre-check needed (the INSERT
      // can't hang on a UNIQUE/FK violation here).
      const newId = crypto.randomUUID();
      // Hash in JS + unhex(?). sha256(?) returns VARCHAR; routing a bound param
      // through it into the BLOB rule_text_sha256 hangs evaluatePreparedStatement.
      // original_* set inline to the inserted values (this IS the original).
      const ruleHashHex = await sha256Hex(ruleText);
      // A manually-added rule is NOT tagged distinctly — it's treated as an
      // ordinary extracted rule (no separate human/LLM provenance). extractor_version
      // is NOT NULL with no default, so mirror the value the agent used for THIS
      // file; the added rule then looks identical to the rest. Fall back to any
      // existing value (for a file the agent extracted nothing from) and finally
      // a literal that guards the NOT NULL constraint on a completely empty table
      // — binding NULL there would HANG the connection, not throw a Binder Error.
      // created_by_labeler_id is intentionally NOT written: prod lacks it (it's
      // doc-only) and we no longer mark human-added rules anyway.
      let extractorVersion = "unknown";
      const sibling = await evalPrepared(
        `SELECT extractor_version FROM rule
         WHERE rules_file_id::VARCHAR = ? AND extractor_version IS NOT NULL
         LIMIT 1`,
        [rulesFileId]
      );
      if (sibling.length) {
        extractorVersion = sibling[0].extractor_version;
      } else {
        const anyRule = await evalQuery(
          `SELECT extractor_version FROM rule WHERE extractor_version IS NOT NULL LIMIT 1`
        );
        if (anyRule.length) extractorVersion = anyRule[0].extractor_version;
      }
      // rule_type and execution_guidance are intentionally omitted: the schema
      // defaults (rule_type 'rule', execution_guidance NULL) are exactly right
      // for a hand-added rule, and omitting them avoids binding an ENUM-typed
      // value through a param — the same DuckDB-WASM typed-binding hang we dodge
      // for rule_text_sha256 above.
      await evalPrepared(
        `INSERT INTO rule (
            id, rules_file_id, rule_text, rule_text_norm, rule_text_sha256,
            line_start, line_end,
            original_rule_text, original_line_start, original_line_end,
            extractor_version, extracted_at
         )
         VALUES (
            ?::UUID, ?::UUID, ?, lower(regexp_replace(?, '\\s+', ' ', 'g')), unhex(?),
            ?, ?,
            ?, ?, ?,
            ?, now()
         )`,
        [newId, rulesFileId, ruleText, ruleText.trim(), ruleHashHex, lineStart, lineEnd, ruleText, lineStart, lineEnd, extractorVersion]
      );
      await evalPrepared(
        `INSERT INTO rule_extraction_label (rule_id, labeler_id, decision)
         VALUES (?::UUID, ?::UUID, 'accept')`,
        [newId, labelerId]
      );
      return newId;
    }

    // Append a one-line "[skipped_rule] …" record to the source file's
    // missed_rules log. CONCAT_WS skips a NULL first arg, so the first note on
    // a file with no log yet is stored without a leading newline.
    async function appendMissedRuleNote({ rulesFileId, entry }) {
      await evalPrepared(
        `UPDATE rules_file
         SET missed_rules = CONCAT_WS(chr(10), missed_rules, ?)
         WHERE id::VARCHAR = ?`,
        [entry, rulesFileId]
      );
    }

    // Hard-delete a rule and everything that references it. Children MUST go
    // first: rule_classification_label, rule_extraction_label, and
    // rule_llm_decision all FK to rule(id). Deleting the parent while a child
    // still points at it violates the FK — and DuckDB-WASM HANGS the prepared
    // statement on a constraint violation instead of throwing, wedging the
    // single connection. Same-connection ordering guarantees each child
    // DELETE commits before the parent runs.
    async function deleteRule({ ruleId }) {
      await evalPrepared(`DELETE FROM rule_classification_label WHERE rule_id::VARCHAR = ?`, [ruleId]);
      await evalPrepared(`DELETE FROM rule_extraction_label    WHERE rule_id::VARCHAR = ?`, [ruleId]);
      await evalPrepared(`DELETE FROM rule_comment             WHERE rule_id::VARCHAR = ?`, [ruleId]);
      await evalPrepared(`DELETE FROM rule_llm_decision        WHERE rule_id::VARCHAR = ?`, [ruleId]);
      await evalPrepared(`DELETE FROM rule                     WHERE id::VARCHAR = ?`, [ruleId]);
    }

    // --- Comment + source-block writes ---------------------------------------
    // Inserts bind a generated UUID string and non-null values (DuckDB coerces
    // the string into the UUID id column), so they can't trip the constraint/
    // indexed-column hang family, and no UPDATE touches an indexed column.
    // Every WHERE/equality bind casts the id/key column to VARCHAR (`col::VARCHAR
    // = ?`): the live tables have UUID ids, and binding a JS string straight to a
    // UUID-typed parameter throws "Invalid column type encountered for argument".

    async function addRuleComment({ ruleId, rulesFileId, lineStart, lineEnd, labelerId, body }) {
      const id = crypto.randomUUID();
      // Persist the stable (file, source-span) anchor alongside the UUID so the
      // comment re-links to the rule after the crawler re-extracts it.
      await evalPrepared(
        `INSERT INTO rule_comment (id, rule_id, rules_file_id, line_start, line_end, labeler_id, body)
         VALUES (?, ?, ?, ?, ?, ?, ?)`,
        [id, ruleId, rulesFileId ?? null, lineStart ?? null, lineEnd ?? null, labelerId, body]
      );
      return id;
    }
    async function updateCommentBody({ table, id, body }) {
      // table is a fixed internal literal ('rule_comment' | 'source_block_comment'),
      // never user input — safe to interpolate.
      await evalPrepared(
        `UPDATE ${table} SET body = ?, updated_at = now() WHERE id::VARCHAR = ?`,
        [body, id]
      );
    }
    async function deleteCommentRow({ table, id }) {
      await evalPrepared(`DELETE FROM ${table} WHERE id::VARCHAR = ?`, [id]);
    }

    // Find-or-create the source_block row for a derived unit, keyed on its
    // segmenter (original) span. This reuse is intentional: one source_block
    // per original span, shared by every rule extracted from it (including
    // same-line compound splits). The span index is deliberately non-unique
    // (multiple rules may cover one span), so this find-or-create — not a
    // uniqueness guard — is what keeps blocks deduplicated. Returns the block id.
    async function ensureSourceBlock({ rulesFileId, origStart, origEnd, lineStart, lineEnd, kind, snippet }) {
      const found = await evalPrepared(
        `SELECT id::VARCHAR AS id FROM source_block
         WHERE rules_file_id::VARCHAR = ? AND original_line_start = ? AND original_line_end = ?
         LIMIT 1`,
        [rulesFileId, origStart, origEnd]
      );
      if (found.length) return found[0].id;
      const id = crypto.randomUUID();
      await evalPrepared(
        `INSERT INTO source_block
           (id, rules_file_id, kind, line_start, line_end, original_line_start, original_line_end, snippet)
         VALUES (?, ?, ?, ?, ?, ?, ?, ?)`,
        [id, rulesFileId, kind ?? null, lineStart, lineEnd, origStart, origEnd, snippet ?? null]
      );
      return id;
    }
    async function updateSourceBlockRange({ blockId, lineStart, lineEnd }) {
      await evalPrepared(
        `UPDATE source_block SET line_start = ?, line_end = ?, last_edited_at = now() WHERE id::VARCHAR = ?`,
        [lineStart, lineEnd, blockId]
      );
    }
    async function addBlockComment({ blockId, labelerId, body }) {
      const id = crypto.randomUUID();
      await evalPrepared(
        `INSERT INTO source_block_comment (id, block_id, labeler_id, body) VALUES (?, ?, ?, ?)`,
        [id, blockId, labelerId, body]
      );
      return id;
    }


    // Build the frozen prediction snapshot + hash for a rule's INSERT.
    async function predictedSnapshotArgs(pred) {
      const snapshot = stableStringify({
        prerequisites: pred.prerequisites,
        enforcement_mechanisms: pred.enforcement_mechanisms,
        triggers: pred.triggers,
        ambiguity_level: pred.ambiguity_level,
        ambiguity_notes: pred.ambiguity_notes,
      });
      return await sha256Hex(snapshot);
    }

    // SAVE — one INSERT … ON CONFLICT DO UPDATE that writes all corrected_*
    // axes + decision='accept'. A single round-trip (vs ~13 separate writes)
    // is critical: the old multi-write save interleaved with the 2s poll on
    // the single MotherDuck connection and deadlocked it.
    async function saveClassificationLabel({ ruleId, labelerId, corrected, predictions }) {
      // predicted_* freezes the LLM prediction the labeler reviewed. But
      // predicted_decision_id is NOT-NULL-able-now yet still a FOREIGN KEY to
      // rule_llm_decision(id): rules with no parse_ok prediction (e.g. ones
      // added via "Add Rule", or accept-only rules) have NO decision row, so we
      // MUST bind NULL there — a NULL FK value is exempt from the constraint.
      // Binding a fabricated/nil UUID violates the FK and DuckDB-WASM HANGS the
      // prepared statement forever instead of throwing (the "stuck on Saving…"
      // bug). When there's no prediction every predicted_* column is NULL.
      const pred = predictions.get(ruleId) || null;
      const hasPred = !!(pred && pred.decision_id);
      const snapHash = hasPred ? await predictedSnapshotArgs(pred) : null;
      await evalPrepared(
        `INSERT INTO rule_classification_label (
            rule_id, labeler_id,
            predicted_decision_id, predicted_snapshot_hash,
            predicted_prerequisites, predicted_enforcement_mechanisms, predicted_triggers,
            predicted_ambiguity_level, predicted_ambiguity_notes,
            corrected_prerequisites, corrected_enforcement_mechanisms, corrected_triggers,
            corrected_ambiguity_level, corrected_ambiguity_notes,
            decision
         ) VALUES (
            ?::UUID, ?::UUID,
            ?::UUID, decode(?, 'hex'),
            from_json(?, '["VARCHAR"]'), from_json(?, '["VARCHAR"]'), from_json(?, '["VARCHAR"]'),
            ?, ?,
            from_json(?, '["VARCHAR"]'), from_json(?, '["VARCHAR"]'), from_json(?, '["VARCHAR"]'),
            ?, ?,
            'accept'
         )
         ON CONFLICT (rule_id, labeler_id) DO UPDATE SET
            corrected_prerequisites = excluded.corrected_prerequisites,
            corrected_enforcement_mechanisms = excluded.corrected_enforcement_mechanisms,
            corrected_triggers = excluded.corrected_triggers,
            corrected_ambiguity_level = excluded.corrected_ambiguity_level,
            corrected_ambiguity_notes = excluded.corrected_ambiguity_notes,
            decision = excluded.decision,
            updated_at = now()`,
        [
          ruleId, labelerId,
          hasPred ? pred.decision_id : null,
          snapHash,
          hasPred ? JSON.stringify(pred.prerequisites || []) : null,
          hasPred ? JSON.stringify(pred.enforcement_mechanisms || []) : null,
          hasPred ? JSON.stringify(pred.triggers || []) : null,
          hasPred ? (pred.ambiguity_level || null) : null,
          hasPred ? (pred.ambiguity_notes || null) : null,
          JSON.stringify(corrected.prerequisites || []),
          JSON.stringify(corrected.enforcement_mechanisms || []),
          JSON.stringify(corrected.triggers || []),
          corrected.ambiguity_level || null,
          corrected.ambiguity_notes || null,
        ]
      );
    }

    // SKIP — single upsert that only sets decision='skip', leaving any
    // corrected_* the labeler may have entered untouched.
    async function skipClassificationLabel({ ruleId, labelerId, predictions }) {
      // Same FK guard as saveClassificationLabel: bind NULL predicted_* for
      // rules with no LLM prediction (the nil UUID would violate the FK to
      // rule_llm_decision and hang the connection).
      const pred = predictions.get(ruleId) || null;
      const hasPred = !!(pred && pred.decision_id);
      const snapHash = hasPred ? await predictedSnapshotArgs(pred) : null;
      await evalPrepared(
        `INSERT INTO rule_classification_label (
            rule_id, labeler_id, predicted_decision_id, predicted_snapshot_hash, decision
         ) VALUES (?::UUID, ?::UUID, ?::UUID, decode(?, 'hex'), 'skip')
         ON CONFLICT (rule_id, labeler_id) DO UPDATE SET
            decision = 'skip', updated_at = now()`,
        [ruleId, labelerId, hasPred ? pred.decision_id : null, snapHash]
      );
    }

    // =================================================================
    // identity
    // =================================================================
    const IDENTITY_KEY = "labeling.identity.labelerId";
    const IdentityContext = createContext(null);

    function IdentityProvider({ children }) {
      const [labelers, setLabelers] = useState([]);
      const [current, setCurrent] = useState(null);

      const refresh = useCallback(async () => {
        try {
          const next = await listLabelers();
          setLabelers(next);
          setCurrent(prev => {
            if (prev) return next.find(l => l.id === prev.id) ?? prev;
            const stored = localStorage.getItem(IDENTITY_KEY);
            if (stored) {
              const match = next.find(l => l.id === stored);
              if (match) return match;
            }
            return next[0] ?? null;
          });
        } catch (err) { console.error("listLabelers failed:", err); }
      }, []);
      useEffect(() => { refresh(); }, [refresh]);
      useEffect(() => { if (current) localStorage.setItem(IDENTITY_KEY, current.id); }, [current?.id]);

      const setCurrentById = useCallback(
        (id) => setCurrent(labelers.find(l => l.id === id) ?? null),
        [labelers]
      );
      const addLabeler = useCallback(async (handle) => {
        const created = await upsertLabeler(handle);
        setLabelers(prev => {
          if (prev.some(l => l.id === created.id)) return prev;
          return [...prev, created].sort((a, b) => a.handle.localeCompare(b.handle));
        });
        setCurrent(created);
        return created;
      }, []);
      const value = useMemo(
        () => ({ labelers, current, setCurrentById, addLabeler, refresh }),
        [labelers, current, setCurrentById, addLabeler, refresh]
      );
      return html`<${IdentityContext.Provider} value=${value}>${children}<//>`;
    }
    function useIdentity() {
      const ctx = useContext(IdentityContext);
      if (!ctx) throw new Error("useIdentity inside IdentityProvider");
      return ctx;
    }

    function displayName(labeler) {
      if (!labeler) return "";
      if (labeler.display_name) return labeler.display_name;
      const base = (labeler.handle || "").split("@")[0];
      if (!base) return labeler.handle || "";
      return base.charAt(0).toUpperCase() + base.slice(1);
    }

    function LabelerPicker() {
      const { labelers, current, setCurrentById, addLabeler } = useIdentity();
      const [adding, setAdding] = useState(false);
      const [draft, setDraft] = useState("");

      const submit = async () => {
        const h = draft.trim();
        if (!h) return;
        await addLabeler(h);
        setDraft(""); setAdding(false);
      };

      if (adding) {
        return html`
          <div className="labeler-block">
            <span>Labeler</span>
            <div className="add-handle-row">
              <input autoFocus placeholder="alice@example.com" value=${draft}
                onChange=${e => setDraft(e.target.value)}
                onKeyDown=${e => { if (e.key === "Enter") submit(); if (e.key === "Escape") setAdding(false); }} />
              <button onClick=${submit}>Save</button>
              <button onClick=${() => setAdding(false)}>Cancel</button>
            </div>
          </div>
        `;
      }
      return html`
        <div className="labeler-block">
          <span>Labeler</span>
          <div className="labeler-pill">
            <select value=${current?.id ?? ""}
              onChange=${(e) => {
                if (e.target.value === "__add__") { setAdding(true); return; }
                setCurrentById(e.target.value);
              }}>
              ${labelers.length === 0 && html`<option value="">— none —</option>`}
              ${labelers.map(l => html`<option key=${l.id} value=${l.id}>${displayName(l)}</option>`)}
              <option value="__add__">+ Add new…</option>
            </select>
            <${ChevronDown} />
          </div>
        </div>
      `;
    }

    // =================================================================

             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${children}</svg>
      `;
    }
