<!DOCTYPE html>
<!--
  ================================================================
  Rules Labeling — single-file static HTML app (v0.4 / UI-design.pen)
  ================================================================

  HOW TO RUN
  ----------
  ES modules don't work over file://, so this page won't open by
  double-clicking. Serve the folder over HTTP and open it from there:

      cd <folder-containing-this-file>
      python3 -m http.server 8765
      # then open http://localhost:8765/labeling-platform.html

  CONFIG
  ------
  Three sources, tried in order:
    1. window.__LABELING_CONFIG (config.js — generated at Vercel build time)
    2. fetch('./.env')           (local dev)
    3. localStorage              (DevTools paste)
  See documents/LABELING-STACK.md for the full picture.
  ================================================================
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rules Labeling</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&family=Funnel+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" />

  <script type="importmap">
    {
      "imports": {
        "react":            "https://esm.sh/react@18.3.1",
        "react-dom":        "https://esm.sh/react-dom@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "htm":              "https://esm.sh/htm@3.1.1",
        "@motherduck/wasm-client": "https://cdn.jsdelivr.net/npm/@motherduck/wasm-client@1.5.2-r.3/+esm"
      }
    }
  </script>

  <style>
    :root {
      /* Surfaces */
      --surface-primary: #F4F2EF;
      --surface-inverse: #1A1A1A;
      --card: #FFFFFF;

      /* Foreground */
      --fg-primary: #1A1A1A;
      --fg-secondary: #4A4A4A;
      --fg-tertiary: #7A7773;
      --fg-inverse: #FFFFFF;

      /* Borders */
      --border-subtle: #EEECE8;
      --border-strong: #CBCCC9;

      /* Accent — gold */
      --accent-gold: #C8B496;
      --accent-gold-light: #F5EFE4;

      /* Highlight */
      --highlight-yellow: #FFF3C4;
      --highlight-green: #D8F0DD;

      /* Status badges */
      --color-success: #DFE6E1;
      --color-success-foreground: #004D1A;
      --color-warning: #E9E3D8;
      --color-warning-foreground: #804200;

      /* Danger — destructive actions (delete) */
      --danger: #B42318;
      --danger-light: #FBEAE8;

      /* Fonts */
      --font-heading: 'Newsreader', Georgia, serif;
      --font-body: 'Inter', ui-sans-serif, system-ui, sans-serif;
      --font-caption: 'Funnel Sans', 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;

      color: var(--fg-primary);
      background: var(--surface-primary);
      font-family: var(--font-body);
      font-size: 14px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    button, input, select, textarea { font: inherit; color: inherit; }

    button {
      align-items: center;
      background: var(--card);
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      color: var(--fg-primary);
      cursor: pointer;
      display: inline-flex;
      gap: 0.4rem;
      font-family: var(--font-body);
      padding: 0.4rem 0.7rem;
    }
    button:hover { border-color: var(--accent-gold); }
    button:disabled { cursor: not-allowed; opacity: 0.5; }
    button.primary {
      background: var(--accent-gold);
      border-color: var(--accent-gold);
      color: var(--fg-primary);
    }
    button.primary:hover { filter: brightness(0.97); }
    .icon-btn {
      width: 32px; height: 32px;
      justify-content: center;
      padding: 0;
    }

    /* ===== Layout shell ===== */
    .app-shell {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--surface-primary);
      overflow: hidden;
    }

    .topbar {
      align-items: center;
      background: var(--card);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      justify-content: space-between;
      padding: 12px 24px;
      gap: 16px;
    }
    .topbar h1 {
      font-family: var(--font-heading);
      font-size: 18px;
      font-weight: 700;
      margin: 0;
    }
    .topbar p {
      color: var(--fg-secondary);
      font-size: 12px;
      margin: 2px 0 0;
    }
    .top-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .labeler-block {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--font-caption);
      font-size: 12px;
      color: var(--fg-secondary);
    }
    .labeler-pill {
      align-items: center;
      background: var(--card);
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      color: var(--fg-primary);
      display: inline-flex;
      gap: 6px;
      padding: 6px 12px;
      font-size: 13px;
    }
    .labeler-pill select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background: transparent;
      border: 0;
      color: inherit;
      cursor: pointer;
      font-size: inherit;
      outline: none;
      padding: 0;
    }
    .labeler-pill select::-ms-expand { display: none; }
    .add-handle-row {
      display: flex; gap: 6px; align-items: center;
    }
    .add-handle-row input {
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      padding: 6px 10px;
      min-width: 12rem;
    }

    .tabs { display: flex; gap: 8px; }
    .tab-btn {
      background: var(--card);
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      color: var(--fg-secondary);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      padding: 0 16px;
      height: 32px;
    }
    .tab-btn.active {
      background: var(--accent-gold);
      border-color: var(--accent-gold);
      color: var(--fg-primary);
      font-weight: 600;
    }

    /* ===== Workbench ===== */
    .workbench {
      flex: 1;
      display: grid;
      min-height: 0;
    }
    .workbench.extraction {
      grid-template-columns: 300px 1fr 380px;
    }
    .workbench.classification {
      grid-template-columns: 320px 1fr;
    }

    /* ===== Sidebar (shared shell) ===== */
    .sidebar {
      background: var(--card);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 16px 16px 12px;
    }
    .search-input {
      align-items: center;
      background: var(--surface-primary);
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      display: flex;
      gap: 8px;
      padding: 0 12px;
      height: 36px;
    }
    .search-input input {
      background: transparent;
      border: 0;
      flex: 1;
      font-size: 13px;
      outline: none;
      padding: 0;
    }
    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dropdown-pill {
      align-items: center;
      background: var(--surface-primary);
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      display: inline-flex;
      gap: 6px;
      height: 32px;
      padding: 0 10px;
    }
    .dropdown-pill select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background: transparent;
      border: 0;
      cursor: pointer;
      font-size: 13px;
      outline: none;
      padding: 0;
      padding-right: 2px;
    }
    .dropdown-pill select::-ms-expand { display: none; }
    .filter-row .count-label { margin-left: auto; }
    .count-label {
      color: var(--fg-secondary);
      font-family: var(--font-caption);
      font-size: 12px;
    }
    .sidebar-divider {
      background: var(--border-subtle);
      height: 1px;
      width: 100%;
    }
    .sidebar-list {
      flex: 1;
      overflow: auto;
      padding: 4px 8px;
    }

    /* ===== Extraction: file list ===== */
    .file-item {
      align-items: center;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      text-align: left;
      width: 100%;
      margin-bottom: 2px;
    }
    .file-item:hover {
      background: var(--surface-primary);
    }
    .file-item.active {
      background: var(--accent-gold-light);
    }
    .file-item .filename {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .gh-icon {
      color: var(--fg-tertiary);
    }
    .file-item.active .gh-icon { color: var(--accent-gold); }
    .rule-count-badge {
      background: var(--surface-primary);
      border-radius: 4px;
      color: var(--fg-secondary);
      font-family: var(--font-caption);
      font-size: 10px;
      padding: 2px 6px;
    }
    .file-item.active .rule-count-badge {
      background: var(--accent-gold-light);
      border: 1px solid var(--accent-gold);
      color: var(--accent-gold);
    }

    /* ===== Code viewer ===== */
    .viewer {
      display: flex;
      flex-direction: column;
      background: var(--surface-primary);
      overflow: hidden;
    }
    .viewer-header {
      align-items: center;
      background: var(--surface-primary);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      gap: 12px;
      padding: 12px 16px;
    }
    .viewer-filename {
      font-family: var(--font-heading);
      font-size: 16px;
      font-weight: 600;
    }
    .breadcrumb {
      color: var(--fg-secondary);
      flex: 1;
      font-family: var(--font-caption);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .gh-btn {
      align-items: center;
      background: var(--surface-primary);
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      color: var(--fg-secondary);
      display: inline-flex;
      font-family: var(--font-caption);
      font-size: 12px;
      gap: 6px;
      padding: 6px 12px;
      text-decoration: none;
    }
    .gh-btn:hover { border-color: var(--accent-gold); }
    /* Line numbers and code share one grid: each number cell and its code
       cell land in the same grid row, so a wrapped (multi-visual-row) code
       line stretches its row and the number stays aligned to the line. */
    .viewer-body {
      flex: 1;
      display: grid;
      grid-template-columns: auto 1fr;
      align-content: start;
      overflow: auto;
      user-select: text;
    }
    .viewer-body .ln {
      background: var(--surface-primary);
      border-right: 1px solid var(--border-subtle);
      color: var(--fg-tertiary);
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.7;
      min-width: 24px;
      padding: 0 12px 0 16px;
      text-align: right;
      user-select: none;
    }
    .viewer-body .ln:first-of-type { padding-top: 12px; }
    .viewer-body .ln:last-of-type { padding-bottom: 12px; }
    .code-line {
      font-size: 13px;
      line-height: 1.7;
      white-space: pre-wrap;
      padding: 0 16px;
      border-radius: 2px;
      min-width: 0;
    }
    .code-line:first-of-type { padding-top: 12px; }
    .code-line:last-of-type { padding-bottom: 12px; }
    .code-line.rule-line {
      background: var(--highlight-green);
      cursor: pointer;
    }
    .code-line.rule-line:hover {
      filter: brightness(0.96);
    }
    .code-line.highlight {
      background: var(--highlight-yellow);
    }
    .status-bar {
      align-items: center;
      background: var(--surface-primary);
      border-top: 1px solid var(--border-subtle);
      color: var(--fg-secondary);
      display: flex;
      gap: 12px;
      font-family: var(--font-caption);
      font-size: 11px;
      padding: 8px 16px;
    }
    .status-bar .spacer { flex: 1; }
    .status-bar .sel-info {
      color: var(--accent-gold);
      font-weight: 500;
    }
    .status-bar .divider {
      color: var(--fg-tertiary);
    }

    /* ===== Rules panel (right on extraction) ===== */
    .rules-panel {
      background: var(--card);
      border-left: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .rules-panel-header {
      background: var(--card);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 20px 24px 16px;
    }
    .rules-panel-header .header-top {
      align-items: center;
      display: flex;
      justify-content: space-between;
    }
    .rules-panel-header h2 {
      font-family: var(--font-heading);
      font-size: 20px;
      font-weight: 600;
      margin: 0;
    }
    .rules-panel-header .header-meta {
      align-items: center;
      color: var(--fg-secondary);
      display: flex;
      font-family: var(--font-caption);
      font-size: 11px;
      justify-content: space-between;
      letter-spacing: 0.3px;
    }
    .add-rule-btn {
      align-items: center;
      background: var(--accent-gold);
      border: 1px solid var(--accent-gold);
      border-radius: 4px;
      color: var(--fg-primary);
      cursor: pointer;
      display: inline-flex;
      font-family: var(--font-caption);
      font-size: 12px;
      font-weight: 500;
      gap: 6px;
      letter-spacing: 0.5px;
      padding: 6px 12px;
    }
    .add-rule-btn:disabled {
      background: var(--card);
      border-color: var(--border-subtle);
      color: var(--fg-tertiary);
      cursor: not-allowed;
    }
    /* ===== Danger (destructive) buttons + inline delete confirm ===== */
    .danger-btn {
      align-items: center;
      background: var(--danger);
      border: 1px solid var(--danger);
      border-radius: 4px;
      color: #fff;
      cursor: pointer;
      display: inline-flex;
      font-family: var(--font-caption);
      font-size: 12px;
      font-weight: 500;
      gap: 6px;
      letter-spacing: 0.5px;
      padding: 6px 12px;
    }
    .danger-btn:hover { filter: brightness(0.95); border-color: var(--danger); }
    .danger-btn.ghost {
      background: var(--card);
      border-color: var(--border-subtle);
      color: var(--danger);
    }
    .danger-btn.ghost:hover { background: var(--danger-light); border-color: var(--danger); }
    .delete-confirm-text {
      color: var(--danger);
      font-family: var(--font-caption);
      font-size: 11px;
      font-weight: 600;
      margin-right: auto;
    }

    /* ===== Add-rule modal ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26, 26, 26, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 100;
    }
    .modal-card {
      background: var(--card);
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
      display: flex;
      flex-direction: column;
      max-height: 88vh;
      width: min(560px, 100%);
    }
    .modal-header {
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 16px 20px;
    }
    .modal-header h3 { font-size: 15px; font-weight: 600; margin: 0; }
    .modal-sub {
      color: var(--fg-tertiary);
      font-family: var(--font-caption);
      font-size: 11px;
      letter-spacing: 0.3px;
    }
    .modal-body {
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: auto;
      padding: 16px 20px;
    }
    .modal-field { display: flex; flex-direction: column; gap: 5px; }
    .modal-label {
      color: var(--fg-secondary);
      font-family: var(--font-caption);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .modal-hint {
      color: var(--fg-tertiary);
      font-weight: 400;
      letter-spacing: 0.3px;
      text-transform: none;
    }
    .modal-textarea, .modal-select {
      background: transparent;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      font-size: 13px;
      padding: 7px 9px;
      resize: vertical;
      width: 100%;
    }
    .modal-textarea:focus, .modal-select:focus { border-color: var(--accent-gold); outline: none; }
    .modal-axes-title {
      color: var(--fg-secondary);
      font-family: var(--font-caption);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.6px;
      margin-top: 2px;
      text-transform: uppercase;
    }
    .modal-axes-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 1fr;
    }
    .modal-actions {
      border-top: 1px solid var(--border-subtle);
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      padding: 14px 20px;
    }
    .rules-list {
      flex: 1;
      overflow: auto;
    }
    .rule-item {
      border-bottom: 1px solid var(--border-subtle);
      cursor: pointer;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .rule-item:hover { background: var(--surface-primary); }
    .rule-item.expanded {
      background: var(--highlight-yellow);
      border-left: 3px solid var(--accent-gold);
      padding-left: 13px;
      cursor: default;
      flex-direction: column;
      align-items: stretch;
      gap: 0;
    }
    .rule-item-summary {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }
    .rule-item-summary-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }
    .rule-item-text {
      color: var(--fg-primary);
      font-size: 13px;
      font-weight: 500;
    }
    .rule-item-meta {
      color: var(--fg-secondary);
      font-family: var(--font-caption);
      font-size: 10px;
      letter-spacing: 0.3px;
    }
    .rule-type-badge {
      border-radius: 3px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-right: 6px;
      padding: 1px 5px;
      text-transform: uppercase;
    }
    .rule-type-badge.rule {
      background: var(--card);
      border: 1px solid var(--border-subtle);
      color: var(--fg-tertiary);
    }
    .rule-type-badge.context {
      background: var(--accent-gold-light);
      border: 1px solid var(--accent-gold);
      color: var(--fg-secondary);
    }
    .rule-item.expanded .rule-item-summary {
      width: 100%;
      padding-bottom: 12px;
    }
    .rule-expanded-detail {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 4px;
    }
    .rule-uuid-row {
      align-items: center;
      display: flex;
      justify-content: space-between;
    }
    .rule-uuid-label {
      color: var(--fg-secondary);
      font-family: var(--font-caption);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .rule-uuid-value {
      color: var(--fg-secondary);
      font-family: var(--font-caption);
      font-size: 10px;
      letter-spacing: 0.3px;
    }
    .rule-text-box {
      background: var(--card);
      border: 1px solid var(--accent-gold);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px 12px;
    }
    .rule-text-box .caption {
      color: var(--fg-secondary);
      font-family: var(--font-caption);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .rule-text-box .rule-text-display {
      color: var(--fg-primary);
      font-size: 13px;
      font-weight: 500;
    }
    .rule-text-box textarea {
      background: transparent;
      border: 1px dashed var(--border-strong);
      border-radius: 4px;
      font-size: 13px;
      padding: 6px 8px;
      width: 100%;
      resize: vertical;
    }
    .rule-actions-row {
      align-items: center;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* ===== Extraction: single-block view + Prev/Next pager ===== */
    .empty-toggle {
      align-items: center;
      color: var(--fg-secondary);
      cursor: pointer;
      display: inline-flex;
      font-family: var(--font-caption);
      font-size: 11px;
      gap: 5px;
      letter-spacing: 0.3px;
    }
    .empty-toggle input { cursor: pointer; margin: 0; accent-color: var(--accent-gold); }
    .unit-rollup {
      background: var(--color-warning);
      border-radius: 4px;
      color: var(--color-warning-foreground);
      flex-shrink: 0;
      font-family: var(--font-caption);
      font-size: 10px;
      font-weight: 500;
      padding: 2px 6px;
      white-space: nowrap;
    }
    .unit-rollup.complete {
      background: var(--color-success);
      color: var(--color-success-foreground);
    }
    .block-subhead {
      background: var(--accent-gold-light);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px 16px;
    }
    .block-subhead-top {
      align-items: center;
      display: flex;
      gap: 12px;
    }
    .block-subhead-main {
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .block-snippet {
      color: var(--fg-primary);
      font-size: 12px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;

    .comment-toggle-btn, .block-action-btn {

      align-self: flex-start;

    .axis-grid {

    /* Auto-dismissing hint toast: hold, then fade out over the last ~1.2s
       of a 4s lifetime. Pair with a 4s setTimeout that removes it from the
       DOM so it doesn't linger invisibly. */
    .toast.fade {

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Icons via lucide CSS classes — we ship inline SVG so no extra deps */
    .icon { display: inline-block; vertical-align: middle; }

    @media (max-width: 820px) {
      .workbench.extraction, .workbench.classification { grid-template-columns: 1fr; }
      .rules-panel { border-left: 0; border-top: 1px solid var(--border-subtle); }
