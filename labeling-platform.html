                  <button className="primary" onClick=${confirmAddRule}>Confirm</button>
                </div>
              </div>
            `}
            <div className="rules-list">
              ${rules.length === 0 && html`<div className="empty-state">No rules in this file yet.</div>`}
              ${rules.map(r => {
                const isExpanded = r.rule_id === expandedRuleId;
                const isEditing = editMode?.ruleId === r.rule_id;
                return html`
                  <div key=${r.rule_id}
                       className=${`rule-item${isExpanded ? " expanded" : ""}`}
                       onClick=${() => !isExpanded && setExpandedRuleId(r.rule_id)}>
                    <div className="rule-item-summary"
                         onClick=${() => isExpanded && setExpandedRuleId("")}>
                      <div className="rule-item-summary-content">
                        <span className="rule-item-text">${r.rule_text}</span>
                        <span className="rule-item-meta">Lines ${r.line_start}–${r.line_end}</span>
                      </div>
                      ${isExpanded ? html`<${ChevronDown} size=${14} />` : html`<${ChevronRight} size=${14} />`}
                    </div>
                    ${isExpanded && html`
                      <div className="rule-expanded-detail">
                        <div className="rule-uuid-row">
                          <span className="rule-uuid-label">RULE UUID</span>
                          <span className="rule-uuid-value">#${r.rule_id.slice(0, 8)}</span>
                        </div>
                        ${isEditing && html`
                          <div className="rule-text-box">
                            <span className="caption">RULE TEXT</span>
                            <textarea value=${editMode.ruleText}
                              onChange=${e => setEditMode({ ...editMode, ruleText: e.target.value })} />
                            <div className="rule-lines-row">
                              <input type="number" value=${editMode.lineStart}
                                onChange=${e => setEditMode({ ...editMode, lineStart: Number(e.target.value) })} />
                              <input type="number" value=${editMode.lineEnd}
                                onChange=${e => setEditMode({ ...editMode, lineEnd: Number(e.target.value) })} />
                            </div>
                          </div>
                        `}
                        <div className="rule-actions-row">
                          ${isEditing ? html`
                            <button onClick=${() => setEditMode(null)}>Cancel</button>
                            <button className="primary" onClick=${() => saveRuleEdit(r, editMode)}>
                              Save
                            </button>
                          ` : html`
                            <button className="add-rule-btn" onClick=${() => setEditMode({
                              ruleId: r.rule_id,
                              ruleText: r.rule_text,
                              lineStart: r.line_start,
                              lineEnd: r.line_end,
                            })}>
                              <${PenLineIcon} size=${12} /> Change Rule
                            </button>
                          `}
                        </div>
                      </div>
                    `}
                  </div>
                `;
              })}
            </div>
          </aside>

          ${toast && html`<div className="toast">${toast}</div>`}
        </main>
      `;
    }

    // =================================================================
    // ClassificationPage — 2-pane (Rules sidebar / Form + Save/Skip)
    // =================================================================
    const AXES = [
      { key: "PREREQUISITE", llmKey: "prerequisites",          correctedKey: "corrected_prerequisites",          field: "corrected_prerequisites",          isList: true,  prompt: "What information is needed to enforce this rule?" },
      { key: "ENFORCEMENT",  llmKey: "enforcement_mechanisms", correctedKey: "corrected_enforcement_mechanisms", field: "corrected_enforcement_mechanisms", isList: true,  prompt: "What mechanism enforces this rule?" },
      { key: "TRIGGERS",     llmKey: "triggers",               correctedKey: "corrected_triggers",               field: "corrected_triggers",               isList: true,  prompt: "When/where is this rule triggered?" },
      { key: "AMBIGUITY",    llmKey: "ambiguity_notes",        correctedKey: "corrected_ambiguity_notes",        field: "corrected_ambiguity_notes",        isList: false, prompt: "What needs to be defined by the user? How ambiguous is this rule?" },
    ];

    function ClassificationPage() {
      const { current: labeler } = useIdentity();
      const [items, setItems] = useState([]);
      const [predictions, setPredictions] = useState(new Map());
      const [statusFilter, setStatusFilter] = useState("all");
      const [search, setSearch] = useState("");
      const [selectedRuleId, setSelectedRuleId] = useState("");
      const [expanded, setExpanded] = useState({ PREREQUISITE: true, ENFORCEMENT: false, TRIGGERS: false, AMBIGUITY: false });
      const [toast, setToast] = useState(null);
      const notify = useCallback((kind, msg) => setToast({ kind, msg, t: Date.now() }), []);
      useEffect(() => {
        if (!toast) return;
        const id = setTimeout(() => {
          setToast(cur => (cur && cur.t === toast.t ? null : cur));
        }, toast.kind === "error" ? 5000 : 2500);
        return () => clearTimeout(id);
      }, [toast]);

      const loadItems = useCallback(async () => {
        try {
          const [next, preds] = await Promise.all([getAllClassificationItems(), getClassificationPredictions()]);
          setItems(next);
          setPredictions(preds);
          setSelectedRuleId(cur => cur || next[0]?.rule_id || "");
        } catch (err) { notify("error", `Load failed: ${err.message ?? err}`); }
      }, [notify]);

      useEffect(() => { loadItems(); }, [loadItems]);
      usePolling(loadItems, POLL_INTERVAL_MS, []);

      const filtered = useMemo(() => {
        const q = search.trim().toLowerCase();
        return items.filter(item => {
          if (q && !item.rule_text.toLowerCase().includes(q) && !item.rule_id.toLowerCase().includes(q)) return false;
          if (statusFilter === "all") return true;
          const myLabel = item.labels.find(l => l.labeler_id === labeler?.id);
          // A rule is "labeled by me" only when I clicked Save Classification.
          // Skip and unsaved drafts do not count.
          const isLabeled = myLabel?.decision === "accept";
          return statusFilter === "labeled" ? isLabeled : !isLabeled;
        });
      }, [items, search, statusFilter, labeler?.id]);

      const selected = useMemo(
        () => filtered.find(i => i.rule_id === selectedRuleId) ?? filtered[0],
        [filtered, selectedRuleId]
      );

      function advance(direction = 1) {
        const idx = filtered.findIndex(i => i.rule_id === selectedRuleId);
        const nextIdx = idx + direction;
        const next = filtered[nextIdx >= 0 && nextIdx < filtered.length ? nextIdx : idx];
        if (next) setSelectedRuleId(next.rule_id);
      }

      if (!labeler) {
        return html`<main className="empty-state">Pick a labeler in the top bar to start.</main>`;
      }

      return html`
        <main className="workbench classification">
          <aside className="sidebar">
            <div className="sidebar-controls">
              <div className="search-input">
                <${SearchIcon} size=${16} />
                <input placeholder="Search by text or UUID..."
                  value=${search} onChange=${e => setSearch(e.target.value)} />
              </div>
              <div className="filter-row">
                <div className="dropdown-pill">
                  <select value=${statusFilter} onChange=${e => setStatusFilter(e.target.value)}>
                    <option value="all">All</option>
                    <option value="labeled">Labeled by me</option>
                    <option value="unlabeled">Unlabeled by me</option>
                  </select>
                  <${ChevronDown} size=${14} />
                </div>
                <span className="count-label">${filtered.length} items</span>
              </div>
            </div>
            <div className="sidebar-divider"></div>
            <div className="sidebar-list">
              ${filtered.length === 0 && html`<div className="empty-state">No rules match.</div>`}
              ${filtered.map(item => {
                const my = item.labels.find(l => l.labeler_id === labeler.id);
                const labeled = my?.decision === "accept";
                return html`
                  <button key=${item.rule_id}
                    className=${`class-rule-item${item.rule_id === selected?.rule_id ? " active" : ""}`}
                    onClick=${() => setSelectedRuleId(item.rule_id)}>
                    <span className="text">${item.rule_text}</span>
                    <span className="status-row">
                      <span className=${`status-badge ${labeled ? "labeled" : "unlabeled"}`}>
                        ${labeled ? "labeled" : "unlabeled"}
                      </span>
                      <span className="source-file">${item.short_filename}</span>
                    </span>
                  </button>
                `;
              })}
            </div>
          </aside>

          ${selected ? html`<${ClassificationForm}
              key=${selected.rule_id}
              item=${selected}
              labelerId=${labeler.id}
              predictions=${predictions}
              expanded=${expanded}
              setExpanded=${setExpanded}
              onAfterMutate=${loadItems}
              onAdvance=${advance}
              notify=${notify}
            />` : html`<section className="class-main empty-state">No items.</section>`}

          ${toast && html`<div className=${`toast ${toast.kind}`}>${toast.msg}</div>`}
        </main>
      `;
    }


    function summarizePrediction(pred, axisKey) {
      if (!pred) return "—";
      const v = pred[axisKey];
      if (Array.isArray(v)) return v.length ? v.join(", ") : "—";
      return v || "—";
    }

    function pickHighlightedSnippet(text, startLine, endLine) {
      if (!text) return [];
      const all = text.replace(/\r/g, "").split("\n");
      return all.map((line, i) => ({
        line_number: i + 1,
        text: line,
        highlight: (i + 1) >= startLine && (i + 1) <= endLine,
      }));
    }

    function ClassificationForm({ item, labelerId, predictions, expanded, setExpanded, onAfterMutate, onAdvance, notify }) {
      const myLabel = item.labels.find(l => l.labeler_id === labelerId);
      const codeSnippet = useMemo(
        () => pickHighlightedSnippet(item.document_text, item.line_start, item.line_end),
        [item.document_text, item.line_start, item.line_end]
      );

      function formatList(v) { return (v ?? []).join("\n"); }
      function parseList(v) { return (v ?? "").split("\n").map(s => s.trim()).filter(Boolean); }

      const initial = useMemo(() => {
        const pred = item.prediction;
        return {
          PREREQUISITE: formatList(myLabel?.corrected_prerequisites ?? pred?.prerequisites ?? []),
          ENFORCEMENT: formatList(myLabel?.corrected_enforcement_mechanisms ?? pred?.enforcement_mechanisms ?? []),
          TRIGGERS: formatList(myLabel?.corrected_triggers ?? pred?.triggers ?? []),
          AMBIGUITY: myLabel?.corrected_ambiguity_notes ?? pred?.ambiguity_notes ?? "",
          AMBIGUITY_LEVEL: myLabel?.corrected_ambiguity_level ?? pred?.ambiguity_level ?? "none",
        };
      }, [item.rule_id, myLabel?.updated_at]);
      const [draft, setDraft] = useState(initial);
      useEffect(() => { setDraft(initial); }, [initial]);

      // Axis edits are LOCAL state only — they do NOT hit the DB until the
      // labeler clicks "Save Classification". rule_classification_label thus
      // only reflects what each labeler has explicitly committed (or skipped).
      function patchAxis(axisKey, text) {
        setDraft(cur => ({ ...cur, [axisKey]: text }));
      }
      function patchAmbiguityLevel(level) {
        setDraft(cur => ({ ...cur, AMBIGUITY_LEVEL: level }));
      }

      // idle | saving | success | error — drives the Save button visual.
      const [saveState, setSaveState] = useState("idle");
      useEffect(() => {
        if (saveState !== "success" && saveState !== "error") return;
        const id = setTimeout(() => setSaveState("idle"), 1800);
        return () => clearTimeout(id);
      }, [saveState]);

      // "Save Classification" — commits every corrected_* axis from the
      // local draft, then sets decision = 'accept'. Done as sequential
      // putClassificationField calls (the proven per-field path) since
      // DuckDB-WASM's prepared statement binder doesn't like a single
      // UPDATE that mixes ?::JSON casts with VARCHAR placeholders.
      async function saveClassification() {
        if (saveState === "saving") return;
        setSaveState("saving");
        try {
          const ruleId = item.rule_id;
          await putClassificationField({ ruleId, labelerId, field: "corrected_prerequisites",          value: parseList(draft.PREREQUISITE), predictions });
          await putClassificationField({ ruleId, labelerId, field: "corrected_enforcement_mechanisms", value: parseList(draft.ENFORCEMENT),  predictions });
          await putClassificationField({ ruleId, labelerId, field: "corrected_triggers",               value: parseList(draft.TRIGGERS),     predictions });
          await putClassificationField({ ruleId, labelerId, field: "corrected_ambiguity_level",        value: draft.AMBIGUITY_LEVEL || null, predictions });
          await putClassificationField({ ruleId, labelerId, field: "corrected_ambiguity_notes",        value: draft.AMBIGUITY || null,       predictions });
          await putClassificationDecision({ ruleId, labelerId, decision: "accept", predictions });
          setSaveState("success");
          notify("success", `Saved classification (${item.rule_text.slice(0, 40)}…)`);
          await onAfterMutate();
          onAdvance(1);
        } catch (err) {
          setSaveState("error");
          notify("error", `Save failed: ${err.message ?? err}`);
        }
      }

      // Skip — only writes the decision; does NOT persist draft edits.
      // The draft stays in local state until you navigate away.
      async function skip() {
        try {
          await putClassificationDecision({ ruleId: item.rule_id, labelerId, decision: "skip", predictions });
          await onAfterMutate();
          onAdvance(1);
        } catch (err) { notify("error", `Skip failed: ${err.message ?? err}`); }
      }

      const codeBodyRef = useRef(null);
      useEffect(() => {
        const body = codeBodyRef.current;
        if (!body) return;
        const hl = body.querySelector(".code-section-line.highlight");
        if (!hl) return;
        const bodyRect = body.getBoundingClientRect();
        const hlRect = hl.getBoundingClientRect();
        const offsetWithinBody = hlRect.top - bodyRect.top + body.scrollTop;
        const target = offsetWithinBody - body.clientHeight / 2 + hl.clientHeight / 2;
        body.scrollTo({ top: Math.max(0, target), behavior: "smooth" });
      }, [item.rule_id, item.line_start]);

      return html`
        <section className="class-main">
          <div className="class-top">
            <div className="code-section">
              <div className="code-section-header">
                <span>${item.short_filename}</span>
              </div>
              <div className="code-section-body" ref=${codeBodyRef}>
                ${codeSnippet.map(l => html`
                  <div key=${l.line_number} className=${`code-section-line${l.highlight ? " highlight" : ""}`}>
                    <span className="ln">${l.line_number}</span>
                    <span className="lt">${l.text || " "}</span>
                  </div>
                `)}
              </div>
            </div>
          </div>

          <div className="class-axes-scroll">
            <div className="axis-grid">
              ${AXES.map(axis => {
                const isOpen = !!expanded[axis.key];
                const summary = (() => {
                  if (axis.key === "AMBIGUITY") return draft.AMBIGUITY_LEVEL || "—";
                  return summarizePrediction(item.prediction, axis.llmKey);
                })();
                return html`
                  <div key=${axis.key} className="axis-field">
                    <button className="axis-header"
                      onClick=${() => setExpanded(prev => ({ ...prev, [axis.key]: !prev[axis.key] }))}>
                      <span className="axis-header-left">
                        <span className="axis-label">${axis.key}</span>
                        <span className="axis-summary-value">${summary}</span>
                      </span>
                      ${isOpen ? html`<${ChevronDown} size=${14} />` : html`<${ChevronRight} size=${14} />`}
                    </button>
                    ${isOpen && html`
                      <div className="axis-body">
                        <div className="axis-llm-box">
                          <span className="head">LLM Judge</span>
                          <span className="body">
                            ${axis.isList
                              ? (item.prediction?.[axis.llmKey] ?? []).join(", ") || axis.prompt
                              : (item.prediction?.[axis.llmKey] || axis.prompt)}
                          </span>
                        </div>
                        ${axis.key === "AMBIGUITY" && html`
                          <div className="axis-notes-box">
                            <span className="head">Ambiguity level</span>
                            <select value=${draft.AMBIGUITY_LEVEL}
                              onChange=${e => patchAmbiguityLevel(e.target.value)}>
                              <option value="none">none</option>
                              <option value="low">low</option>
                              <option value="medium">medium</option>
                              <option value="high">high</option>
                            </select>
                          </div>
                        `}
                        <div className="axis-notes-box">
                          <span className="head">Your notes${axis.isList ? " (one per line)" : ""}</span>
                          <textarea value=${draft[axis.key]}
                            placeholder=${`Add your ${axis.key.toLowerCase()} notes...`}
                            onChange=${e => patchAxis(axis.key, e.target.value)} />
                        </div>
                      </div>
                    `}
                  </div>
                `;
              })}
            </div>
          </div>
          <div className="action-bar">
            <button className="skip-btn" onClick=${skip}>Skip</button>
            <button className=${`save-btn ${saveState}`}
              disabled=${saveState === "saving"}
              onClick=${saveClassification}>
              ${saveState === "saving" ? "Saving…"
                : saveState === "success" ? "Saved ✓"
                : saveState === "error"   ? "Save failed ✕"
                : "Save Classification"}
            </button>
          </div>
        </section>
      `;
    }

    // =================================================================
    // App
    // =================================================================
    function App() {
      const [page, setPage] = useState("extraction");
      const [bootError, setBootError] = useState("");
      const [bootReady, setBootReady] = useState(false);

      useEffect(() => {
        let cancelled = false;
        getConnection().then(
          () => { if (!cancelled) setBootReady(true); },
          (err) => { if (!cancelled) setBootError(err.message || String(err)); }
        );
        return () => { cancelled = true; };
      }, []);

      if (bootError) {
        return html`
          <div className="boot-splash">
            <div className="banner error" style=${{ maxWidth: "32rem" }}>
              <b>Failed to connect to MotherDuck.</b><br/>${bootError}
            </div>
          </div>
        `;
      }
      if (!bootReady) {
        return html`
          <div className="boot-splash">
            <div className="spinner"></div>
            <div style=${{ color: "var(--fg-secondary)" }}>Loading WASM and connecting to MotherDuck…</div>
            <div style=${{ fontSize: "12px", color: "var(--fg-tertiary)" }}>First load may take a few seconds.</div>
          </div>
        `;
      }

      return html`
        <${IdentityProvider}>
          <div className="app-shell">
            <header className="topbar">
              <div>
                <h1>${page === "extraction" ? "Extraction" : "Classification"}</h1>
                <p>${
                  page === "extraction"
                    ? "Extract and review rules from markdown source files."
                    : "Review extracted rules and classification fields against source text."
                }</p>
              </div>
              <div className="top-right">
                <${LabelerPicker} />
                <button className="icon-btn" title="Refresh"
                  onClick=${() => window.location.reload()}>
                  <${RefreshIcon} size=${14} />
                </button>
                <div className="tabs">
                  <button className=${`tab-btn${page === "extraction" ? " active" : ""}`}
                    onClick=${() => setPage("extraction")}>Extraction</button>
                  <button className=${`tab-btn${page === "classification" ? " active" : ""}`}
                    onClick=${() => setPage("classification")}>Classification</button>
                </div>
              </div>
            </header>
            ${page === "extraction" ? html`<${ExtractionPage} />` : html`<${ClassificationPage} />`}
          </div>
        <//>
      `;
    }

    createRoot(document.getElementById("root")).render(html`<${App} />`);
  </script>
</body>
</html>
